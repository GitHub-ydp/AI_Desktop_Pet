<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>瀹犵墿鐨勫皬绐?/title>
  <script src="../src/theme-manager.js"></script>
  <script src="../src/plan-manager.js"></script>
  <script src="../assets/lib/lottie.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      background: var(--bg, #1a0e05);
      color: var(--text, #ffe8cc);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .window-header {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px 0 14px;
      border-bottom: 1px solid var(--border, rgba(0,255,240,0.3));
      background: var(--header-bg, rgba(0,15,30,0.98));
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .header-pet-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .header-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent-bg-dim, rgba(0,255,240,0.08));
      border: 1.5px solid var(--border, rgba(0,255,240,0.25));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .header-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .pet-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--neon-cyan, #00fff0);
      text-shadow: var(--glow-sm, 0 0 8px rgba(0,255,240,0.4));
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }
    .mood-mini-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .mood-bar {
      width: 56px;
      height: 3px;
      border-radius: 999px;
      background: var(--accent-bg-dim, rgba(0,255,240,0.12));
      flex-shrink: 0;
    }
    .mood-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--neon-cyan, #00fff0);
      transition: width 0.4s ease;
      width: 0;
    }
    .mood-text {
      font-size: 10px;
      color: var(--text-muted, rgba(160,220,240,0.65));
      white-space: nowrap;
    }
    .window-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
    }
    .window-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border, rgba(0,255,240,0.3));
      background: transparent;
      color: var(--text-muted, rgba(160,220,240,0.7));
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
    }
    .window-btn:hover {
      border-color: var(--neon-cyan, #00fff0);
      color: var(--neon-cyan, #00fff0);
      background: var(--accent-bg-faint, rgba(0,255,240,0.06));
    }
    .window-btn.close:hover {
      border-color: var(--neon-magenta, #ff2d78);
      color: var(--neon-magenta, #ff2d78);
      background: var(--danger-hover-bg, rgba(255,45,120,0.08));
    }
    .header-nav-btn {
      width: 28px;
      height: 28px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted, rgba(160,220,240,0.6));
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .header-nav-btn:hover {
      background: var(--accent-bg-faint, rgba(0,255,240,0.06));
      color: var(--neon-cyan, #00fff0);
      border-color: var(--border, rgba(0,255,240,0.3));
    }
    .header-nav-btn svg { width: 14px; height: 14px; stroke-width: 1.8; }
    .app-body { flex: 1; display: flex; overflow: hidden; }
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg { display: flex; gap: 8px; max-width: 80%; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.ai { align-self: flex-start; }
    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .bubble-text {
      min-width: 0;
    }
    .bubble-text.is-rich {
      white-space: normal;
    }
    .bubble-text.is-rich p {
      margin: 0;
    }
    .bubble-text.is-rich p + p {
      margin-top: 10px;
    }
    .bubble-text.is-rich ul {
      margin: 10px 0 0;
      padding-left: 18px;
    }
    .bubble-text.is-rich li + li {
      margin-top: 8px;
    }
    .bubble-text.is-rich strong {
      color: var(--neon-cyan, #00fff0);
      font-weight: 700;
    }
    .bubble-text.is-rich .news-lead {
      color: var(--text, #cff0ff);
      font-weight: 600;
    }
    .bubble-text.is-rich .news-tag {
      display: inline-block;
      margin-right: 6px;
      padding: 1px 8px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--bubble-border, rgba(0,255,240,0.3)) 88%, transparent);
      background: color-mix(in srgb, var(--accent-bg-dim, rgba(0,255,240,0.08)) 92%, transparent);
      color: var(--neon-cyan, #00fff0);
      font-size: 12px;
      font-weight: 700;
      vertical-align: 1px;
    }
    .bubble-text.is-rich .news-tail {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed color-mix(in srgb, var(--bubble-border, rgba(0,255,240,0.3)) 75%, transparent);
      color: var(--text-muted, rgba(160,220,240,0.9));
    }
    .bubble.has-image {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .bubble-image {
      display: block;
      width: min(280px, 100%);
      border-radius: 12px;
      border: 1px solid var(--border, rgba(0,255,240,0.3));
      background: var(--bg-surface, rgba(0,15,30,0.98));
    }
    .msg.user .bubble {
      background: var(--neon-cyan, #00fff0);
      color: #020810;
      border-radius: 12px 2px 12px 12px;
    }
    .msg.ai .bubble {
      background: var(--bubble-bg, var(--bg-card, rgba(0,30,55,0.8)));
      border: 1px solid var(--bubble-border, var(--border, rgba(0,255,240,0.3)));
      box-shadow: 0 8px 18px color-mix(in srgb, var(--bubble-shadow, rgba(0,255,240,0.18)) 100%, transparent);
      color: var(--text, #cff0ff);
      border-radius: 2px 12px 12px 12px;
    }
    .quota-bubble {
      padding: 0;
      overflow: hidden;
      max-width: 360px;
    }
    .quota-card {
      padding: 16px 16px 14px;
      background: linear-gradient(180deg, rgba(255, 179, 71, 0.12), rgba(0, 30, 55, 0.92));
    }
    .quota-title {
      font-size: 15px;
      font-weight: 700;
      color: #ffd6a0;
      margin-bottom: 8px;
    }
    .quota-desc {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text, #cff0ff);
    }
    .quota-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .quota-btn {
      min-width: 104px;
      height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--border, rgba(0,255,240,0.3));
      background: transparent;
      color: var(--text, #cff0ff);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .quota-btn:hover {
      border-color: var(--neon-cyan, #00fff0);
      color: var(--neon-cyan, #00fff0);
    }
    .quota-btn.primary {
      border: none;
      background: linear-gradient(90deg, #ffb347, #ff6b35);
      color: #1a1210;
      box-shadow: 0 8px 18px rgba(255, 107, 53, 0.24);
    }
    .quota-btn.primary:hover {
      color: #1a1210;
      filter: brightness(1.05);
      box-shadow: 0 10px 20px rgba(255, 107, 53, 0.34);
    }
    .typing-wrap {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 4px 0 2px;
    }
    .typing-wrap.show { display: flex; }
    .typing-dots {
      display: flex;
      gap: 3px;
      align-items: flex-end;
    }
    .typing-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--neon-cyan, #00fff0);
      animation: typingBounce 1.3s ease-in-out infinite;
      opacity: 0.7;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.14s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.28s; }
    @keyframes typingBounce {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50% { transform: translateY(-5px); opacity: 1; }
    }
    .typing-label {
      font-size: 12px;
      color: var(--text-muted, rgba(160,220,240,0.6));
      font-style: italic;
    }
    .agent-status {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      margin-left: 2px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border, rgba(0,255,240,0.3));
      background: linear-gradient(180deg, var(--bg-card, rgba(0,30,55,0.6)), var(--bg-surface, rgba(2,10,20,0.98)));
      color: var(--text, #cff0ff);
      box-shadow: 0 10px 24px var(--bubble-shadow, rgba(0,255,240,0.12));
      max-width: 360px;
    }
    .agent-status.show {
      display: inline-flex;
    }
    .agent-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--neon-cyan, #00fff0);
      box-shadow: 0 0 0 0 rgba(0, 255, 240, 0.35);
      animation: agentPulse 1.4s ease-out infinite;
      flex-shrink: 0;
    }
    .agent-status--attention .agent-status-dot {
      background: var(--neon-magenta, #ff2d78);
      box-shadow: 0 0 0 0 rgba(255, 45, 120, 0.25);
    }
    .agent-status--success .agent-status-dot {
      background: #4cff91;
      box-shadow: 0 0 0 0 rgba(76, 255, 145, 0.22);
    }
    .agent-status-text {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text, #cff0ff);
    }
    .composer {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .attachment-tray {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      margin-bottom: 8px;
      border-radius: 12px;
      border: 1px solid var(--border, rgba(0,255,240,0.3));
      background: var(--bg-card, rgba(0,30,55,0.6));
    }
    .attachment-tray.show {
      display: flex;
    }
    .attachment-thumb {
      display: none;
      width: 42px;
      height: 42px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border, rgba(0,255,240,0.3));
      background: var(--bg-surface, rgba(0,15,30,0.98));
      flex-shrink: 0;
    }
    .attachment-thumb.show {
      display: block;
    }
    .attachment-file-badge {
      display: none;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 1px solid var(--border, rgba(0,255,240,0.3));
      background: linear-gradient(160deg, var(--accent-bg-dim, rgba(0,255,240,0.08)), var(--bg-surface, rgba(0,15,30,0.98)));
      color: var(--neon-cyan, #00fff0);
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .attachment-file-badge.show {
      display: flex;
    }
    .attachment-meta {
      flex: 1;
      min-width: 0;
    }
    .attachment-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text, #cff0ff);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .attachment-desc {
      font-size: 11px;
      color: var(--text-muted, rgba(160,220,240,0.75));
    }
    .attachment-remove {
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid var(--border, rgba(0,255,240,0.3));
      background: transparent;
      color: var(--text-muted, rgba(160,220,240,0.75));
      cursor: pointer;
      font-size: 11px;
      flex-shrink: 0;
    }
    .input-area {
      padding: 16px;
      background: var(--input-area-bg, rgba(0,12,25,0.98));
      border-top: 1px solid var(--border, rgba(0,255,240,0.3));
    }
    .input-box {
      display: flex;
      flex-direction: column;
      border-radius: 14px;
      border: 1px solid var(--border, rgba(0,255,240,0.3));
      background: var(--bg-card, rgba(0,30,55,0.6));
      backdrop-filter: blur(12px);
      transition: border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }
    .input-box:focus-within {
      border-color: var(--border-bright, rgba(0,255,240,0.7));
      box-shadow: var(--glow-sm, 0 0 10px rgba(0,255,240,0.2));
    }
    textarea#chatInput {
      width: 100%;
      resize: none;
      height: 72px;
      min-height: 72px;
      max-height: 160px;
      background: transparent;
      color: var(--text, #cff0ff);
      border: none;
      padding: 12px 14px 4px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
    }
    .input-box.is-quota-disabled {
      border-color: rgba(255, 179, 71, 0.45);
      box-shadow: 0 0 0 1px rgba(255, 179, 71, 0.12);
    }
    textarea#chatInput.is-quota-disabled {
      color: rgba(255, 232, 204, 0.7);
      cursor: not-allowed;
    }
    textarea#chatInput::placeholder { color: var(--text-muted, rgba(160,220,240,0.35)); }
    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px 10px;
      background: transparent;
    }
    .input-tools {
      display: flex;
      gap: 6px;
    }
    .tool-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted, rgba(160,220,240,0.65));
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .tool-btn svg {
      width: 18px;
      height: 18px;
      stroke-width: 1.6;
    }
    .tool-btn:hover {
      background: var(--accent-bg-dim, rgba(0,255,240,0.06));
      color: var(--neon-cyan, #00fff0);
    }
    .tool-btn.is-disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }
    .send-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--neon-cyan, #00fff0);
      color: #020810;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      box-shadow: var(--glow-sm, 0 0 8px rgba(0,255,240,0.25));
    }
    .send-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
      box-shadow: var(--glow-md, 0 0 10px rgba(0,255,240,0.4));
    }
    .send-btn:disabled {
      background: var(--bg-card, rgba(0,30,55,0.6));
      color: var(--text-muted, rgba(160,220,240,0.3));
      cursor: not-allowed;
      box-shadow: none;
      border: 1px solid var(--border, rgba(0,255,240,0.1));
    }
    .send-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 20px 24px;
      gap: 0;
    }
    .empty-lottie {
      width: 140px;
      height: 140px;
      flex-shrink: 0;
      margin-bottom: 16px;
    }
    .empty-greeting {
      font-size: 16px;
      font-weight: 600;
      color: var(--text, #cff0ff);
      margin-bottom: 5px;
      text-align: center;
    }
    .empty-sub {
      font-size: 12px;
      color: var(--text-muted, rgba(160,220,240,0.6));
      margin-bottom: 22px;
      text-align: center;
    }
    .quick-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 320px;
    }
    .quick-chip {
      padding: 7px 15px;
      border-radius: 20px;
      border: 1px solid var(--border, rgba(0,255,240,0.3));
      background: var(--accent-bg-dim, rgba(0,255,240,0.06));
      color: var(--text, #cff0ff);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
    }
    .quick-chip:hover {
      border-color: var(--neon-cyan, #00fff0);
      background: var(--accent-bg-faint, rgba(0,255,240,0.1));
      color: var(--neon-cyan, #00fff0);
      transform: translateY(-1px);
    }
    .plan-card {
      background: var(--accent-bg-faint, rgba(0,255,240,0.05));
      border: 1px solid var(--border, rgba(0,255,240,0.3));
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 8px;
      font-size: 12px;
    }
    .plan-card-header { color: var(--neon-cyan, #00fff0); font-weight: bold; margin-bottom: 8px; }
    .plan-card-steps { display: flex; flex-direction: column; gap: 4px; }
    .plan-step { display: flex; align-items: center; gap: 6px; }
    .plan-step--pending { color: rgba(255,255,255,0.5); }
    .plan-step--running { color: var(--neon-cyan, #00fff0); }
    .plan-step--done { color: #4cff91; text-decoration: line-through; opacity: 0.7; }
    .plan-step--error { color: var(--neon-magenta, #ff2d78); }
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 12, 18, 0.42);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 16px;
    }
    .confirm-overlay.show { display: flex; }
    .confirm-dialog {
      width: min(760px, 100%);
      background: linear-gradient(180deg, var(--confirm-bg, rgba(240,252,249,0.98)), var(--bg-surface, rgba(245,253,251,0.98)));
      border: 1px solid var(--border-bright, rgba(0,255,240,0.7));
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
    }
    .confirm-title { color: var(--neon-cyan, #00fff0); font-size: 14px; font-weight: 700; margin-bottom: 10px; }
    .confirm-message {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text, #cff0ff);
      background: var(--accent-bg-faint, rgba(255,255,255,0.02));
      border: 1px solid var(--border, rgba(0,255,240,0.3));
      border-radius: 12px;
      padding: 12px;
    }
    .confirm-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
    .confirm-btn {
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border, rgba(0,255,240,0.3));
      background: var(--bg-surface, rgba(2,10,20,0.98));
      color: var(--text, #cff0ff);
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }
    .confirm-btn:hover {
      background: var(--accent-bg-faint, rgba(0,255,240,0.06));
      transform: translateY(-1px);
    }
    .confirm-btn.danger {
      color: var(--neon-magenta, #ff2d78);
      border-color: var(--danger-border, rgba(255,45,120,0.45));
      background: var(--danger-hover-bg, rgba(255,45,120,0.06));
    }
    .confirm-diff {
      margin-top: 12px;
      display: none;
      border: 1px solid var(--border, rgba(0,255,240,0.3));
      border-radius: 12px;
      background: var(--bg-surface, rgba(0,10,20,0.72));
      overflow: hidden;
    }
    .confirm-diff.show { display: block; }
    .confirm-diff-meta {
      padding: 8px 10px;
      font-size: 12px;
      color: var(--text-muted, rgba(160,220,240,0.65));
      border-bottom: 1px solid var(--border, rgba(0,255,240,0.3));
    }
    .confirm-diff-lines {
      max-height: 280px;
      overflow: auto;
      font-family: Consolas, "SFMono-Regular", Monaco, monospace;
      font-size: 12px;
    }
    .confirm-diff-line {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 10px;
      padding: 4px 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .confirm-diff-line--remove { background: rgba(255,45,120,0.14); color: #ff9abc; }
    .confirm-diff-line--add { background: rgba(76,255,145,0.12); color: #98ffc0; }
    .confirm-diff-line-number { color: var(--text-muted, rgba(160,220,240,0.65)); text-align: right; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 12px;
      border: 1px solid var(--border, rgba(0,255,240,0.3));
      background: rgba(2,15,30,0.95);
      color: var(--neon-cyan, #00fff0);
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    @keyframes agentPulse {
      0% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(0, 255, 240, 0.35); }
      70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 240, 0); }
      100% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(0, 255, 240, 0); }
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar, rgba(0,255,240,0.35)); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover, rgba(0,255,240,0.6)); }

    /* 鈹€鈹€ Remotion-style spring entrance animations 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
       cubic-bezier(0.22, 1, 0.36, 1) 妯℃嫙 Remotion spring { damping: 200 }
       鏃犲弽寮广€佽嚜鐒跺噺閫燂紝瀹屽叏瀵归綈 Remotion 鐨?smooth 棰勮              */
    @keyframes msgSlideInLeft {
      from { opacity: 0; transform: translate(-40px, 10px) scale(0.86); }
      to   { opacity: 1; transform: translate(0, 0)        scale(1);    }
    }
    @keyframes msgSlideInRight {
      from { opacity: 0; transform: translate(40px, 10px) scale(0.86); }
      to   { opacity: 1; transform: translate(0, 0)       scale(1);    }
    }
    .msg.ai   { animation: msgSlideInLeft  0.52s cubic-bezier(0.22, 1, 0.36, 1) both; will-change: transform, opacity; }
    /* 鍔ㄧ敾瀹屾垚鍚庨噴鏀?GPU 鍥惧眰 */
    .msg.ai.anim-done { will-change: auto; }

    /* 鈹€鈹€ 娴佸紡杈撳嚭鍏夋爣锛圧emotion 鎵撳瓧鏈?blinking cursor锛夆攢鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
    .streaming-cursor {
      display: inline-block;
      width: 2px;
      height: 1.05em;
      background: var(--neon-cyan, #00fff0);
      margin-left: 2px;
      vertical-align: text-bottom;

      animation: cursorBlink 1s step-end infinite;
    }
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>

  <script>
    let isProcessing = false;
    let pendingApprovalDialog = null;
    let agentSessionId = sessionStorage.getItem('chatAgentSessionId') || null;
    let activeAgentStream = null;
    let streamingAssistantMessage = null;
    let toastTimer = null;
    let pendingImageAttachment = null;
    let agentSessionPersonality = sessionStorage.getItem('chatAgentPersonality') || null;
    let agentSessionPetName = sessionStorage.getItem('chatAgentPetName') || '';
    let agentStatusTimer = null;
    let quotaExceededActive = false;
    let quotaPromptWrapper = null;
    let defaultChatPlaceholder = '';

    // 鈹€鈹€ 缁堢椋庢牸鎵撳瓧鏈虹姸鎬?鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
    // 璁捐锛歴etTimeout 鑷皟搴︼紙闈?rAF锛夛紝22ms/瀛楃 鈮?45瀛?绉?
    // 鍍?Mac 缁堢 cat 杈撳嚭锛氬寑閫熴€佹満姊版劅銆佹瘡涓瓧娓呮櫚鍙
    // lag > 40 鏃惰嚜鍔ㄥ姞閫熷埌 2瀛?tick锛岄槻姝㈢Н鍘?
    let streamBuffer = '';        // 宸叉帴鏀跺畬鏁存枃鏈?
    let streamDisplayed = 0;      // 宸叉覆鏌撳瓧绗︽暟
    let streamTimeout = null;     // setTimeout 鍙ユ焺
    let streamingTextNode = null; // bubble 鍐呮枃瀛?div
    let streamingCursorEl = null; // 鍏夋爣 span
    let isStreaming = false;       // 娴佸紡浼氳瘽鏄惁浠嶅湪杩涜
    const TICK_MS = 22;           // 姣?tick 闂撮殧锛坢s锛夛紝璋冨ぇ=鏇存參鏇存竻鏅?

    function getStoredPetData() {
      try {
        return JSON.parse(localStorage.getItem('pet_data') || '{}');
      } catch {
        return {};
      }
    }

    function getCurrentPersonality() {
      const petData = getStoredPetData();
      return typeof petData.personality === 'string' && petData.personality.trim()
        ? petData.personality.trim()
        : 'healing';
    }

    function resetAgentSession() {
      agentSessionId = null;
      agentSessionPersonality = null;
      agentSessionPetName = '';
      sessionStorage.removeItem('chatAgentSessionId');
      sessionStorage.removeItem('chatAgentPersonality');
      sessionStorage.removeItem('chatAgentPetName');
    }

    function getCurrentPetNameSetting() {
      try {
        return JSON.parse(localStorage.getItem('settings') || '{}').petName || '';
      } catch {
        return '';
      }
    }

    function setAgentStatus(message, tone = 'working', autoHideMs = 0) {
      const status = document.getElementById('agentStatus');
      const text = document.getElementById('agentStatusText');
      if (!status || !text) return;
      if (agentStatusTimer) {
        clearTimeout(agentStatusTimer);
        agentStatusTimer = null;
      }
      text.textContent = message || '\u6b63\u5728\u5904\u7406\u4e2d...';
      status.classList.add('show');
      status.classList.remove('agent-status--attention', 'agent-status--success');
      if (tone === 'attention') {
        status.classList.add('agent-status--attention');
      } else if (tone === 'success') {
        status.classList.add('agent-status--success');
      }
      const container = document.getElementById('messagesWrap');
      if (container) container.scrollTop = container.scrollHeight;
      if (autoHideMs > 0) {
        agentStatusTimer = setTimeout(() => {
          clearAgentStatus();
        }, autoHideMs);
      }
    }

    function clearAgentStatus() {
      const status = document.getElementById('agentStatus');
      if (!status) return;
      if (agentStatusTimer) {
        clearTimeout(agentStatusTimer);
        agentStatusTimer = null;
      }
      status.classList.remove('show', 'agent-status--attention', 'agent-status--success');
    }

    function formatToolLabel(toolName) {
      const labels = {
        file_edit: '\u6587\u4ef6\u4fee\u6539',
        file_write: '\u6587\u4ef6\u5199\u5165',
        file_read: '\u6587\u4ef6\u8bfb\u53d6',
        file_list: '\u6587\u4ef6\u5217\u8868',
        file_search: '\u6587\u4ef6\u641c\u7d22',
        bash_run: '\u547d\u4ee4\u6267\u884c',
        web_search: '\u7f51\u7edc\u641c\u7d22',
        web_fetch: '\u7f51\u9875\u8bfb\u53d6',
        screenshot_ocr: '\u622a\u56fe\u8bc6\u522b',
        reminder_create: '\u63d0\u9192\u521b\u5efa',
        memory_search: '\u8bb0\u5fc6\u68c0\u7d22',
        open_url: '\u6253\u5f00\u94fe\u63a5',
        open_app: '\u6253\u5f00\u5e94\u7528'
      };
      return labels[toolName] || toolName || '\u64cd\u4f5c';
    }

    function closeWindow() {
      if (window.electron && window.electron.closeChildWindow) {
        window.electron.closeChildWindow('chat');
      }
    }

    function minimizeWindow() {
      if (window.electron && window.electron.minimizeCurrentWindow) {
        window.electron.minimizeCurrentWindow();
      }
    }

    function handleVoiceFeature() {
      showToast('\u8bed\u97f3\u53d1\u9001\u5f00\u53d1\u4e2d');
    }

    function handleVideoFeature() {
      showToast('\u89c6\u9891\u53d1\u9001\u5f00\u53d1\u4e2d');
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function autoGrowTextarea() {
      const input = document.getElementById('chatInput');
      input.style.height = 'auto';
      const newHeight = Math.min(input.scrollHeight, 160);
      input.style.height = (newHeight || 80) + 'px';
    }

    function renderAttachmentPreview() {
      const tray = document.getElementById('attachmentTray');
      const thumb = document.getElementById('attachmentThumb');
      const badge = document.getElementById('attachmentBadge');
      const title = document.getElementById('attachmentTitle');
      const desc = document.getElementById('attachmentDesc');
      if (!tray || !thumb || !badge || !title || !desc) return;

      thumb.classList.remove('show');
      badge.classList.remove('show');
      thumb.removeAttribute('src');

      if (!pendingImageAttachment) {
        tray.classList.remove('show');
        return;
      }

      if (pendingImageAttachment.type === 'image') {
        thumb.src = pendingImageAttachment.dataURL;
        thumb.classList.add('show');
        title.textContent = pendingImageAttachment.name || '\u5df2\u7c98\u8d34\u622a\u56fe';
        desc.textContent = '\u53d1\u9001\u540e\u4f1a\u8fde\u540c\u56fe\u7247\u4e00\u8d77\u5206\u6790';
      } else {
        badge.textContent = buildFileBadgeLabel(pendingImageAttachment.name || 'FILE');
        badge.classList.add('show');
        title.textContent = pendingImageAttachment.name || '\u5df2\u9009\u62e9\u6587\u4ef6';
        desc.textContent = pendingImageAttachment.truncated
          ? '\u53d1\u9001\u65f6\u4f1a\u9644\u5e26\u6587\u4ef6\u5185\u5bb9\uff08\u5df2\u622a\u65ad\uff09'
          : '\u53d1\u9001\u65f6\u4f1a\u9644\u5e26\u6587\u4ef6\u5185\u5bb9';
      }

      tray.classList.add('show');
    }

    function clearPendingImageAttachment() {
      pendingImageAttachment = null;
      const fileInput = document.getElementById('fileUploadInput');
      if (fileInput) fileInput.value = '';
      renderAttachmentPreview();
    }

    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error || new Error('file_read_failed'));
        reader.readAsDataURL(file);
      });
    }

    function fileToText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(reader.error || new Error('file_read_failed'));
        reader.readAsText(file, 'utf-8');
      });
    }

    function isTextLikeFile(file) {
      const name = String(file && file.name ? file.name : '');
      const type = String(file && file.type ? file.type : '').toLowerCase();
      return type.startsWith('text/') || /\.(txt|md|json|csv|log|js|ts|py)$/i.test(name);
    }

    function buildFileBadgeLabel(name) {
      const ext = String(name || '').split('.').pop().trim().toUpperCase();
      if (!ext || ext === String(name || '').toUpperCase()) {
        return 'FILE';
      }
      return ext.slice(0, 4);
    }

    async function handleImagePaste(file) {
      const dataURL = await fileToDataURL(file);
      pendingImageAttachment = {
        type: 'image',
        name: file.name || `pasted-image-${Date.now()}.png`,
        mimeType: file.type || 'image/png',
        dataURL
      };
      renderAttachmentPreview();
      showToast('\u622a\u56fe\u5df2\u7c98\u8d34');
    }

    async function handleFileSelection(file) {
      if (!file) return;
      if (file.type && file.type.startsWith('image/')) {
        await handleImagePaste(file);
        return;
      }
      if (!isTextLikeFile(file)) {
        showToast('\u6682\u4ec5\u652f\u6301\u56fe\u7247\u548c\u6587\u672c\u7c7b\u6587\u4ef6');
        return;
      }
      const rawText = await fileToText(file);
      const textContent = rawText.trim();
      if (!textContent) {
        showToast('\u8fd9\u4e2a\u6587\u4ef6\u662f\u7a7a\u7684');
        return;
      }
      pendingImageAttachment = {
        type: 'text',
        name: file.name || `attachment-${Date.now()}.txt`,
        mimeType: file.type || 'text/plain',
        text: textContent.slice(0, 6000),
        truncated: textContent.length > 6000
      };
      renderAttachmentPreview();
      showToast('\u6587\u4ef6\u5df2\u6dfb\u52a0');
    }

    function buildEffectiveMessage(message, attachment) {
      if (!attachment || attachment.type === 'image') {
        return message || (attachment ? '\u8bf7\u5e2e\u6211\u770b\u4e00\u4e0b\u8fd9\u5f20\u56fe\u7247\u3002' : '');
      }

      const base = message || '\u8bf7\u7ed3\u5408\u9644\u4ef6\u5185\u5bb9\u5904\u7406\u3002';
      const suffix = attachment.truncated ? '\n...[\u9644\u4ef6\u5df2\u622a\u65ad]' : '';
      return `${base}\n\n[\u9644\u4ef6\u6587\u4ef6: ${attachment.name}]\n${attachment.text}${suffix}`;
    }

    function buildOutgoingPreviewText(message, attachment) {
      if (!attachment) {
        return message;
      }
      if (attachment.type === 'image') {
        return message || '\u53d1\u9001\u4e86\u4e00\u5f20\u56fe\u7247';
      }
      return message || `\u53d1\u9001\u4e86\u6587\u4ef6\uff1a${attachment.name}`;
    }

    function createMessageNode(role, content, attachments = null) {
      const wrapper = document.createElement('div');
      wrapper.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const imageAttachment = Array.isArray(attachments)
        ? attachments.find((attachment) => attachment && typeof attachment.dataURL === 'string')
        : null;
      if (imageAttachment) {
        bubble.classList.add('has-image');
        const image = document.createElement('img');
        image.className = 'bubble-image';
        image.src = imageAttachment.dataURL;
        image.alt = imageAttachment.name || 'attachment';
        bubble.appendChild(image);
      }
      const textNode = document.createElement('div');
      textNode.className = 'bubble-text';
      setBubbleContent(textNode, content, role === 'assistant');
      bubble.appendChild(textNode);
      wrapper.appendChild(bubble);
      return { wrapper, bubble };
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text == null ? '' : String(text);
      return div.innerHTML;
    }
    function formatAssistantText(content) {
      const source = String(content || '').replace(/\r\n/g, '\n').trim();
      if (!source) {
        return '';
      }

      const lines = source.split('\n');
      const html = [];
      let listOpen = false;

      const closeList = () => {
        if (listOpen) {
          html.push('</ul>');
          listOpen = false;
        }
      };

      const formatInline = (text) => {
        let value = escapeHtml(text);
        value = value.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        value = value.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '<strong>$1</strong>');
        return value;
      };

      for (let index = 0; index < lines.length; index += 1) {
        const line = lines[index].trim();

        if (!line) {
          closeList();
          continue;
        }

        const bulletMatch = line.match(/^(?:[-*]|\d+[.)])\s*(.+)$/);
        if (bulletMatch) {
          if (!listOpen) {
            html.push('<ul>');
            listOpen = true;
          }
          const itemBody = formatInline(bulletMatch[1])
            .replace(/^<strong>([^<]+)<\/strong>\s*[:：]\s*/, '<span class="news-tag">$1</span>');
          html.push(`<li>${itemBody}</li>`);
          continue;
        }

        closeList();

        if (index === 0 && /[:：]$/.test(line)) {
          html.push(`<p class="news-lead">${formatInline(line)}</p>`);
          continue;
        }

        const paragraphHtml = formatInline(line)
          .replace(/^<strong>([^<]+)<\/strong>\s*[:：]\s*/, '<span class="news-tag">$1</span>');
        html.push(`<p>${paragraphHtml}</p>`);
      }

      closeList();
      return html.join('');
    }

    function setBubbleContent(node, content, rich = false) {
      if (!node) return;
      const text = content == null ? '' : String(content);
      if (!rich) {
        node.classList.remove('is-rich');
        node.textContent = text;
        return;
      }
      const formatted = formatAssistantText(text);
      if (!formatted) {
        node.classList.remove('is-rich');
        node.textContent = text;
        return;
      }
      node.classList.add('is-rich');
      node.innerHTML = formatted;
    }

    function addMessage(role, content, attachments = null) {
      const container = document.getElementById('messagesWrap');
      const emptyState = document.getElementById('emptyState');
      if (emptyState) emptyState.style.display = 'none';

      const messageNode = createMessageNode(role, content, attachments);

      if (role === 'assistant' && window.PlanManager) {
        const plan = window.PlanManager.parsePlan(content);
        if (plan) {
          container.appendChild(messageNode.wrapper);
          window.PlanManager.injectPlanCard(messageNode.wrapper, plan);
          const doneStep = window.PlanManager.parseStepDone(content);
          if (doneStep) window.PlanManager.updateStep(doneStep, 'done');
          container.scrollTop = container.scrollHeight;
          return messageNode.bubble;
        }
        const doneStep = window.PlanManager.parseStepDone(content);
        if (doneStep) window.PlanManager.updateStep(doneStep, 'done');
      }

      container.appendChild(messageNode.wrapper);
      container.scrollTop = 999999;
      // 鍔ㄧ敾缁撴潫鍚庨噴鏀?will-change GPU 鍥惧眰
      messageNode.wrapper.addEventListener('animationend', () => {
        messageNode.wrapper.classList.add('anim-done');
      }, { once: true });
      return messageNode.bubble;
    }

    function persistAgentSession() {
      if (agentSessionId) {
        sessionStorage.setItem('chatAgentSessionId', agentSessionId);

        sessionStorage.setItem('chatAgentPersonality', agentSessionPersonality);

    async function ensureAgentSession() {
      const personality = getCurrentPersonality();
      const petName = getCurrentPetNameSetting();
      if (agentSessionId && agentSessionPersonality === personality && agentSessionPetName === petName) return agentSessionId;
      if (agentSessionId && (agentSessionPersonality !== personality || agentSessionPetName !== petName)) {
        resetAgentSession();
      }
      if (!window.PetAgent || !window.PetAgent.startSession) {
        throw new Error('PetAgent unavailable');
      }
      console.log('[chat-window] startSession begin');
      const started = await window.PetAgent.startSession({
        channel: 'chat-window',
        metadata: { personality, petName }
      });
      console.log('[chat-window] startSession result:', started);
      if (!started || started.error || !started.sessionId) {
        throw new Error((started && started.error) || 'agent_start_session_failed');
      }
      agentSessionId = started.sessionId;
      agentSessionPersonality = personality;
      agentSessionPetName = petName;
      persistAgentSession();
      return agentSessionId;
    }

    async function sendViaBasicChat(message) {
      if (!window.electron || !window.electron.sendChatMessage) {

      const result = await window.electron.sendChatMessage(message);
      hideTyping();
      if (result && result.success) {
        if (result.reply === window.PetAPI?.quotaExceededMarker || result.reply === '__QUOTA_EXCEEDED__') {
          throw new Error('quota_exceeded');
        }
        addMessage('assistant', result.reply || '濂界殑~');
        return true;
      }

      throw new Error((result && result.error) ? result.error : 'basic_chat_failed');
    }

    // 鈹€鈹€ 缁堢椋庢牸鎵撳瓧鏈烘牳蹇?tick 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
    function _tickStream() {
      streamTimeout = null;
      if (!streamingTextNode) return;

      const lag = streamBuffer.length - streamDisplayed;

      if (lag > 0) {
        // lag > 40 鏃惰ˉ閫燂紝闃叉鏈嶅姟鍣ㄦ祦閫熻繙蹇簬鏄剧ず閫熷害鏃剁Н鍘嬭繃澶?
        const step = lag > 40 ? 2 : 1;
        streamDisplayed = Math.min(streamDisplayed + step, streamBuffer.length);
        streamingTextNode.textContent = streamBuffer.slice(0, streamDisplayed);
        streamingTextNode.classList.remove('is-rich');
        const container = document.getElementById('messagesWrap');
        if (container) container.scrollTop = 999999;
        streamTimeout = setTimeout(_tickStream, TICK_MS);
      } else if (isStreaming) {
        // 宸茶拷涓?buffer锛屼絾娴佽繕娌＄粨鏉燂紝绛夊緟涓嬩竴涓?delta
        streamTimeout = setTimeout(_tickStream, TICK_MS);
      }
      // isStreaming=false 涓?lag=0锛氬叏閮ㄦ樉绀哄畬姣曪紝鑷劧鍋滄
    }

    function appendAssistantDelta(delta) {
      hideTyping();
      setAgentStatus('\u6b63\u5728\u56de\u590d\u4e2d...', 'working');
      if (!streamingAssistantMessage) {
        streamingAssistantMessage = addMessage('assistant', '');
        streamBuffer = '';
        streamDisplayed = 0;
        isStreaming = true;
        streamingTextNode = streamingAssistantMessage.querySelector('div') || streamingAssistantMessage;
        streamingCursorEl = document.createElement('span');
        streamingCursorEl.className = 'streaming-cursor';
        streamingAssistantMessage.appendChild(streamingCursorEl);
        streamTimeout = setTimeout(_tickStream, TICK_MS); // 鍚姩锛屼笉鍐嶆墜鍔ㄩ噸鍚?
      }
      streamBuffer += delta || '';
    }

    function finalizeStreamedAssistantMessage(finalText) {
      const text = finalText || '\u597d\u7684~';
      // 鏍囪娴佺粨鏉燂紝tick 浼氳嚜鐒舵帓骞?buffer 鍚庡仠姝?
      isStreaming = false;
      if (streamTimeout) { clearTimeout(streamTimeout); streamTimeout = null; }
      // 绉婚櫎鍏夋爣
      if (streamingCursorEl && streamingCursorEl.parentNode) {
        streamingCursorEl.parentNode.removeChild(streamingCursorEl);
        streamingCursorEl = null;
      }
      // 鐩存帴鍦ㄥ師鑺傜偣鍐欏叆鏈€缁堟枃鏈紝閬垮厤 DOM 璺冲彉
      if (streamingTextNode) {
        setBubbleContent(streamingTextNode, text, true);
      } else if (streamingAssistantMessage) {
        const fallbackTextNode = document.createElement('div');
        fallbackTextNode.className = 'bubble-text';
        setBubbleContent(fallbackTextNode, text, true);
        streamingAssistantMessage.replaceChildren(fallbackTextNode);
      } else {
        // 闄嶇骇锛氭棦鏃犳祦寮忚妭鐐癸紝姝ｅ父娣诲姞
        return addMessage('assistant', text);
      }
      const bubble = streamingAssistantMessage;
      streamingAssistantMessage = null;
      streamingTextNode = null;
      streamBuffer = '';
      streamDisplayed = 0;
      return bubble;
    }

    async function openAgentStream(sessionId, runId) {
      if (!window.PetAgent || !window.PetAgent.openStream || !runId) {
        return;
      }

      if (activeAgentStream && typeof activeAgentStream.close === 'function') {
        activeAgentStream.close();
      }

      activeAgentStream = await window.PetAgent.openStream({
        sessionId,
        runId,
        afterSeq: 0
      }, (event) => {
        if (!event || !event.type) return;

        switch (event.type) {
          case 'message.delta':
            appendAssistantDelta(event.payload && event.payload.delta ? event.payload.delta : '');
            break;
          case 'tool.started': {
            const toolName = event.payload && event.payload.toolName ? event.payload.toolName : '';
            setAgentStatus(`\u6b63\u5728\u6267\u884c${formatToolLabel(toolName)}...`, 'working');
            break;
          }
          case 'tool.delta': {
            const toolName = event.payload && event.payload.toolName ? event.payload.toolName : '';
            setAgentStatus(`\u6b63\u5728\u5904\u7406${formatToolLabel(toolName)}\u7684\u8f93\u51fa...`, 'working');
            break;
          }
          case 'tool.completed': {
            const toolName = event.payload && event.payload.toolName ? event.payload.toolName : '';
            const ok = !event.payload || event.payload.ok !== false;
            setAgentStatus(ok ? `\u5df2\u5b8c\u6210${formatToolLabel(toolName)}` : `${formatToolLabel(toolName)}\u6267\u884c\u5931\u8d25`, ok ? 'success' : 'attention', ok ? 900 : 0);
            break;
          }
          case 'approval.requested':
            showAgentApproval(event.payload || null, runId);
            break;
          case 'run.failed':
            console.error('[chat-window] agent run failed event:', event.payload || null);
            setAgentStatus('\u8fd9\u6b21\u64cd\u4f5c\u6ca1\u6709\u5b8c\u6210', 'attention');
            break;
          case 'run.completed':
            setAgentStatus('\u64cd\u4f5c\u5df2\u5b8c\u6210', 'success', 900);
            break;
          default:
            break;
        }
      });
    }

    function finishAgentRun() {
      if (activeAgentStream && typeof activeAgentStream.close === 'function') {
        activeAgentStream.close();
      }
      activeAgentStream = null;
      // 鍋滄 tick锛屾竻鐞嗘祦寮忕姸鎬?
      isStreaming = false;
      if (streamTimeout) { clearTimeout(streamTimeout); streamTimeout = null; }
      if (streamingCursorEl && streamingCursorEl.parentNode) {
        streamingCursorEl.parentNode.removeChild(streamingCursorEl);
        streamingCursorEl = null;
      }
      if (streamingTextNode && streamBuffer.length > streamDisplayed) {
        // 纭繚鍓╀綑 buffer 鍏ㄩ儴鏄剧ず
        setBubbleContent(streamingTextNode, streamBuffer, true);
      }
      streamingTextNode = null;
      streamBuffer = '';
      streamDisplayed = 0;
      streamingAssistantMessage = null;
      isProcessing = false;
      document.getElementById('sendBtn').disabled = false;
      hideTyping();
      clearAgentStatus();
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      if (quotaExceededActive) return;
      const message = input.value.trim();
      const attachment = pendingImageAttachment;
      const attachments = attachment && attachment.type === 'image' ? [attachment] : null;
      const previousAttachment = pendingImageAttachment;
      const effectiveMessage = buildEffectiveMessage(message, attachment);
      if ((!effectiveMessage && !attachments) || isProcessing) return;

      isProcessing = true;
      document.getElementById('sendBtn').disabled = true;
      addMessage('user', buildOutgoingPreviewText(message, attachment), attachments);
      input.value = '';
      autoGrowTextarea();
      clearPendingImageAttachment();
      showTyping();
      setAgentStatus('\u6b63\u5728\u601d\u8003\u4e2d...', 'working');

      try {
        if (window.PetAgent) {
          try {
            const sessionId = await ensureAgentSession();
            console.log('[chat-window] send begin:', {
              sessionId,
              textLength: effectiveMessage.length,
              attachments: attachments ? attachments.length : 0
            });
            const result = await window.PetAgent.send({
              sessionId,
              text: effectiveMessage,
              attachments,
              source: 'chat-window'
            });
            console.log('[chat-window] send result:', result);

            if (result && result.status === 'failed') {
              throw new Error(result.reason || 'agent_send_failed');
            }

            try {
              await openAgentStream(sessionId, result.runId);
            } catch (streamError) {
              console.warn('[chat-window] open stream failed:', streamError);
            }

            console.log('[chat-window] wait begin:', { runId: result.runId });
            const waited = await window.PetAgent.wait({
              runId: result.runId,
              timeoutMs: 120000
            });
            console.log('[chat-window] wait result:', waited);
            hideTyping();

            if (!waited || !waited.ok) {
              const waitError = waited && waited.message
                ? `${waited.error || 'agent_wait_failed'}: ${waited.message}`
                : ((waited && waited.error) || 'agent_wait_failed');
              throw new Error(waitError);
            }

            const finalText = waited.finalText || '\u597d\u7684~';
            if (streamingAssistantMessage) {
              finalizeStreamedAssistantMessage(finalText);
            } else {
              addMessage('assistant', finalText);
            }
            finishAgentRun();
            return;
          } catch (agentError) {
            const errorText = String(agentError && agentError.message ? agentError.message : agentError || '');
            console.error('[chat-window] agent path failed:', agentError);
            const canFallbackToBasicChat = !attachments && /PetAgent unavailable|agent_runtime_unavailable/.test(errorText);

            if (canFallbackToBasicChat) {
              finishAgentRun();
              console.log('[chat-window] fallback to basic chat');
              await sendViaBasicChat(effectiveMessage);
              return;
            }

            throw agentError;
          }
        }

        if (attachments) {
          throw new Error('image_attachment_requires_agent');
        }

        await sendViaBasicChat(effectiveMessage);
      } catch (error) {
        console.error('[chat-window] sendMessage failed:', error);
        if (!pendingImageAttachment && previousAttachment) {
          pendingImageAttachment = previousAttachment;
          renderAttachmentPreview();
        }
        if (window.PetAgent) finishAgentRun();
        hideTyping();
        if (isQuotaExceededSignal(error && error.message ? error.message : error)) {
          showQuotaExceededPrompt();
          return;
        }
        const errorText = String(error && error.message ? error.message : error || 'unknown_error').slice(0, 300);
        addMessage('assistant', `\u804a\u5929\u5931\u8d25\uff1a${errorText}`);
      } finally {
        // 鏃犺璧板摢鏉¤矾寰勯兘纭繚瑙ｉ攣锛宖inishAgentRun 宸叉彁鍓嶈皟鐢ㄦ椂鍐嶆璁剧疆涔熸槸瀹夊叏鐨?
        isProcessing = false;
        document.getElementById('sendBtn').disabled = quotaExceededActive;
      }
    }

    function renderApprovalDiff(preview) {
      const panel = document.getElementById('confirmDiffPanel');
      const metaEl = document.getElementById('confirmDiffMeta');
      const linesEl = document.getElementById('confirmDiffLines');
      const diff = Array.isArray(preview && preview.diff) ? preview.diff : [];

      if (!preview || diff.length === 0) {
        panel.classList.remove('show');
        metaEl.textContent = '';
        linesEl.innerHTML = '';
        return;
      }

      const stats = preview.stats || {};
      metaEl.textContent = `${preview.path || ''}  ${preview.action || ''}  +${stats.added || 0} / -${stats.removed || 0}`;
      linesEl.innerHTML = diff.map((line) => {
        const type = line.type === 'remove' ? 'remove' : 'add';
        const symbol = type === 'remove' ? '-' : '+';
        const lineNumber = line.lineNumber || '';
        const text = String(line.text == null ? '' : line.text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
        return `
          <div class="confirm-diff-line confirm-diff-line--${type}">
            <div class="confirm-diff-line-number">${symbol}${lineNumber}</div>
            <div>${text || '&nbsp;'}</div>
          </div>
        `;
      }).join('');
      panel.classList.add('show');
    }

    function showApprovalDialog({ title, message, kind, approvalId = null, runId = null, requestId = null, preview = null }) {
      pendingApprovalDialog = { title, message, kind, approvalId, runId, requestId, preview };
      const overlay = document.getElementById('confirmOverlay');
      overlay.querySelector('.confirm-title').textContent = title || '\u786e\u8ba4\u6267\u884c\u9ad8\u98ce\u9669\u64cd\u4f5c';
      document.getElementById('confirmMessage').textContent = message || '\u662f\u5426\u7ee7\u7eed\u6267\u884c\u8be5\u64cd\u4f5c\uff1f';
      renderApprovalDiff(preview);
      overlay.classList.add('show');
      setAgentStatus('\u7b49\u5f85\u4f60\u786e\u8ba4\u64cd\u4f5c...', 'attention');
    }

    async function resolveApprovalDialog(approved) {
      if (!pendingApprovalDialog) return;
      const current = pendingApprovalDialog;
      pendingApprovalDialog = null;
      document.getElementById('confirmOverlay').classList.remove('show');
      renderApprovalDiff(null);

      if (current.kind === 'agent' && window.PetAgent && window.PetAgent.approve) {
        try {
          await window.PetAgent.approve({
            runId: current.runId,
            approvalId: current.approvalId,
            approved
          });
          setAgentStatus(approved ? '\u5df2\u786e\u8ba4\uff0c\u7ee7\u7eed\u6267\u884c\u4e2d...' : '\u5df2\u53d6\u6d88\u8be5\u64cd\u4f5c', approved ? 'working' : 'attention');
        } catch (error) {
          addMessage('assistant', '\u5ba1\u6279\u63d0\u4ea4\u5931\u8d25\uff0c\u8bf7\u91cd\u8bd5\u3002');
        }
        return;
      }

      if (current.kind === 'skill' && window.PetSkills && window.PetSkills.respondConfirm) {
        window.PetSkills.respondConfirm(current.requestId, approved);
      }
    }

    function approveSkillConfirm() { void resolveApprovalDialog(true); }
    function rejectSkillConfirm() { void resolveApprovalDialog(false); }

    function showAgentApproval(payload, runId) {
      const summary = payload && payload.summary ? payload.summary : `\u51c6\u5907\u6267\u884c\u5de5\u5177 ${payload && payload.toolName ? payload.toolName : ''}`.trim();
      const argsText = payload && payload.args ? `\n\n\u53c2\u6570:\n${JSON.stringify(payload.args, null, 2)}` : '';
      showApprovalDialog({
        kind: 'agent',
        approvalId: payload && payload.approvalId ? payload.approvalId : null,
        runId: runId || null,
        title: '\u786e\u8ba4\u6267\u884c Agent \u64cd\u4f5c',
        message: `${summary}${argsText}`,
        preview: payload && payload.preview ? payload.preview : null
      });
    }

    async function loadPetName() {
      const PET_NAMES = {
        '\ud83d\udc31': '\u732b\u54aa',
        '\ud83d\udc36': '\u5c0f\u72d7',
        '\ud83d\udc30': '\u5154\u5154',
        '\ud83e\udd8a': '\u5c0f\u72d0\u72f8',
        '\ud83d\udc3b': '\u5c0f\u718a',
      };
      let name = '';
      // 鏈€楂樹紭鍏堬細鐢ㄦ埛鍦ㄥ垵濮嬪寲鍚戝涓粰瀹犵墿璧风殑鍚嶅瓧
      try {
        const settings = JSON.parse(localStorage.getItem('settings') || '{}');
        if (settings.petName) name = settings.petName;
      } catch (e) {}
      // 绗簩浼樺厛锛氳蹇嗙郴缁?user_profile 涓殑 pet_name 瀛楁
      if (!name) {
        try {
          if (window.electron && window.electron.getPetProfile) {
            const profile = await window.electron.getPetProfile();
            if (Array.isArray(profile)) {
              const row = profile.find(r => r.key === 'pet_name');
              if (row && row.value) name = row.value;
            } else if (profile) {
              name = profile.petName || '';
            }
          }
        } catch (e) {}
      }
      // 绗笁浼樺厛锛歟moji 鈫?涓枃鍚?
      if (!name) {
        try {
          const petData = JSON.parse(localStorage.getItem('pet_data') || '{}');
          name = PET_NAMES[petData.basePet] || '';
        } catch (e) {}
      }
      document.getElementById('petName').textContent = name || '\u6211\u7684\u5ba0\u7269';
    }

    function updateMoodDisplay(mood) {
      const safeMood = Math.max(0, Math.min(100, Number.isFinite(Number(mood)) ? Number(mood) : 80));
      document.getElementById('moodValue').textContent = `${safeMood}`;
      document.getElementById('moodFill').style.width = `${safeMood}%`;
      const texts = [[80,'\u4eca\u5929\u5fc3\u60c5\u5f88\u597d~'],[60,'\u8fd8\u4e0d\u9519\u5462'],[40,'\u6709\u70b9\u65e0\u804a...'],[0,'\u5fc3\u60c5\u6709\u70b9\u4f4e\u843d']];
      const found = texts.find(([t]) => safeMood >= t);
      document.getElementById('moodText').textContent = found ? found[1] : '\u5fc3\u60c5\u6709\u70b9\u4f4e\u843d';
    }

    function initLottie() {
      const container = document.getElementById('chatLottie');
      if (!container) return;

      // 鏍规嵁褰撳墠瀹犵墿绫诲瀷鏇存柊 header 澶村儚 emoji
      const PET_EMOJIS = {
        '\ud83d\udc31': '\ud83d\udc31',
        '\ud83d\udc36': '\ud83d\udc36',
        '\ud83d\udc30': '\ud83d\udc30',
        '\ud83e\udd8a': '\ud83e\udd8a',
        '\ud83d\udc3b': '\ud83d\udc3b',
      };
      try {
        const petData = JSON.parse(localStorage.getItem('pet_data') || '{}');
        const emoji = PET_EMOJIS[petData.basePet] || '\ud83d\udc31';
        const avatarEl = document.getElementById('headerAvatar');
        if (avatarEl) avatarEl.textContent = emoji;
      } catch (e) {}

      if (!window.lottie) return;
      try {
        window.lottie.loadAnimation({
          container,
          renderer: 'svg',
          loop: true,
          autoplay: true,
          path: '../lottie/cat/猫坐在枕头上.json'
        });
      } catch (e) {
        console.warn('[chat-window] lottie init failed:', e);
        // 鍔犺浇澶辫触鏃?container 淇濇寔绌虹櫧锛屼笉褰卞搷浣跨敤
      }
    }

    function goToSettings() {
      if (!window.electron || !window.electron.createChildWindow) return;
      // 涓嶅叧闂亰澶╃獥鍙ｏ紝骞舵帓鎵撳紑璁剧疆锛屽叧闂缃悗鑷劧鍥炲埌鑱婂ぉ
      window.electron.createChildWindow({ id: 'settings', title: '设置', width: 910, height: 640, html: 'windows/settings-window.html' });
    }

    function goToHistory() {
      if (!window.electron || !window.electron.createChildWindow) return;
      // 涓嶅叧闂亰澶╃獥鍙ｏ紝骞舵帓鎵撳紑鍘嗗彶锛屽叧闂巻鍙插悗鑷劧鍥炲埌鑱婂ぉ
      window.electron.createChildWindow({ id: 'history', title: '对话历史', width: 910, height: 640, html: 'windows/history-window.html' });
    }

    function goToTechPanel() {
      if (!window.electron || !window.electron.createChildWindow) return;
      window.electron.createChildWindow({ id: 'skills-panel', title: '\u6280\u80fd\u9762\u677f', width: 1180, height: 760, html: 'windows/skills-panel.html' });
    }

    async function handleScreenshot() {
      try {
        if (!window.PetScreenshot || !window.PetScreenshot.captureFullScreen) {
          showToast('\u622a\u56fe\u529f\u80fd\u4e0d\u53ef\u7528');
          return;
        }
        await window.PetScreenshot.captureFullScreen();
        showToast('\u5df2\u89e6\u53d1\u622a\u56fe');
      } catch (error) {
        showToast('\u622a\u56fe\u5931\u8d25');
      }
    }

    function bindEvents() {
      const input = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');
      const screenshotBtn = document.getElementById('screenshotBtn');
      const uploadBtn = document.getElementById('uploadBtn');
      const voiceBtn = document.getElementById('voiceBtn');
      const videoBtn = document.getElementById('videoBtn');
      const fileUploadInput = document.getElementById('fileUploadInput');
      const attachmentRemoveBtn = document.getElementById('attachmentRemoveBtn');

      if (!defaultChatPlaceholder) {
        defaultChatPlaceholder = input.getAttribute('placeholder') || '\u548c\u6211\u8bf4\u8bf4\u8bdd\u5427~';
      }

      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          void sendMessage();
        }
      });
      input.addEventListener('input', autoGrowTextarea);
      input.addEventListener('paste', async (event) => {
        const items = event.clipboardData ? Array.from(event.clipboardData.items || []) : [];
        const imageItem = items.find((item) => item.type && item.type.startsWith('image/'));
        if (!imageItem) return;
        event.preventDefault();
        const file = imageItem.getAsFile();
        if (!file) return;
        try {
          await handleImagePaste(file);
        } catch (error) {
          showToast('\u56fe\u7247\u7c98\u8d34\u5931\u8d25');
        }
      });
      sendBtn.addEventListener('click', () => void sendMessage());
      screenshotBtn.addEventListener('click', () => void handleScreenshot());
      uploadBtn.addEventListener('click', () => {
        if (fileUploadInput) fileUploadInput.click();
      });
      fileUploadInput.addEventListener('change', async (event) => {
        const file = event.target && event.target.files ? event.target.files[0] : null;
        if (!file) return;
        try {
          await handleFileSelection(file);
        } catch (error) {
          showToast('\u6587\u4ef6\u6dfb\u52a0\u5931\u8d25');
        } finally {
          fileUploadInput.value = '';
        }
      });
      voiceBtn.addEventListener('click', handleVoiceFeature);
      videoBtn.addEventListener('click', handleVideoFeature);
      attachmentRemoveBtn.addEventListener('click', clearPendingImageAttachment);

      document.addEventListener('keydown', (event) => {
        if (!pendingApprovalDialog) return;
        if (event.key === 'Escape') {
          event.preventDefault();
          rejectSkillConfirm();
        }
      });

      window.addEventListener('beforeunload', () => {
        if (pendingApprovalDialog) {
          void resolveApprovalDialog(false);
        }
      });

      if (window.PetSkills && typeof window.PetSkills.onConfirmRequest === 'function') {
        window.PetSkills.onConfirmRequest((data) => {
          if (!data || !data.requestId) return;
          showApprovalDialog({
            kind: 'skill',
            requestId: data.requestId,
            title: '\u786e\u8ba4\u6267\u884c\u9ad8\u98ce\u9669\u64cd\u4f5c',
            message: data.message
          });
        });
      }
    }

    window.addEventListener('DOMContentLoaded', async () => {
      bindEvents();
      autoGrowTextarea();
      renderAttachmentPreview();
      initLottie();
      await loadPetName();
      // 浠?localStorage 璇诲彇瀹為檯蹇冩儏鍊硷紝鑰岄潪纭紪鐮?
      try {
        const petData = JSON.parse(localStorage.getItem('pet_data') || '{}');
        updateMoodDisplay(typeof petData.mood === 'number' ? petData.mood : 80);
      } catch (e) {
        updateMoodDisplay(80);
      }

      // 鐩戝惉璁剧疆绐楀彛鐨勫績鎯呭彉鏇村箍鎾?
      if (window.electron && window.electron.onSettingsChange) {
        window.electron.onSettingsChange((event, payload) => {
          if (payload && payload.type === 'mood' && typeof payload.mood === 'number') {
            updateMoodDisplay(payload.mood);
          }
          if (payload && payload.type === 'personality' && typeof payload.personality === 'string') {
            resetAgentSession();
            showToast('\u6027\u683c\u5df2\u66f4\u65b0\uff0c\u4e0b\u4e00\u8f6e\u5bf9\u8bdd\u751f\u6548');
          }
          if (payload && payload.type === 'pet-name') {
            resetAgentSession();
            loadPetName();
            showToast('\u540d\u5b57\u5df2\u66f4\u65b0\uff0c\u4e0b\u4e00\u8f6e\u5bf9\u8bdd\u751f\u6548');
          }
        });
      }

      // 鍚屾椂鐩戝惉 localStorage 鍙樺寲锛堣法绐楀彛 storage 浜嬩欢锛?
      window.addEventListener('storage', (e) => {
        if (e.key === 'pet_data') {
          try {
            const petData = JSON.parse(e.newValue || '{}');
            if (typeof petData.mood === 'number') updateMoodDisplay(petData.mood);
            if (typeof petData.personality === 'string') resetAgentSession();
          } catch (_) {}
        }
        if (e.key === 'settings') {
          resetAgentSession();
          loadPetName();
        }
      });
    });
  </script>
</body>
