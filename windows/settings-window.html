<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置</title>
  <script src="../src/theme-manager.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #020810;
      --bg-card: rgba(0, 30, 55, 0.6);
      --border: rgba(0, 255, 240, 0.3);
      --border-bright: rgba(0, 255, 240, 0.7);
      --neon-cyan: #00fff0;
      --neon-magenta: #ff2d78;
      --text: #cff0ff;
      --text-muted: rgba(160, 220, 240, 0.55);
      --glow-sm: 0 0 8px rgba(0, 255, 240, 0.4);
      --glow-md: 0 0 16px rgba(0, 255, 240, 0.35), 0 0 4px rgba(0, 255, 240, 0.6);
      --radius: 8px;
      --header-bg: rgba(0, 15, 30, 0.98);
      --input-area-bg: rgba(0, 12, 25, 0.98);
      --personality-bg: rgba(0, 15, 35, 0.5);
      --confirm-bg: rgba(0, 20, 45, 0.98);
      --close-icon: rgba(160, 220, 240, 0.6);
      --accent-bg-faint: rgba(0, 255, 240, 0.06);
      --accent-bg-dim: rgba(0, 255, 240, 0.08);
      --accent-bg-checked: rgba(0, 255, 240, 0.3);
      --accent-hover-bg: rgba(0, 255, 240, 0.1);
      --danger-glow: 0 0 8px rgba(255, 45, 120, 0.4);
      --danger-hover-bg: rgba(255, 45, 120, 0.08);
      --danger-border: rgba(255, 45, 120, 0.5);
      --scrollbar: rgba(0, 255, 240, 0.35);
      --scrollbar-hover: rgba(0, 255, 240, 0.6);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .window-header {
      background: var(--header-bg);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
    }

    .window-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--neon-cyan);
      letter-spacing: 0.5px;
      text-shadow: var(--glow-sm);
    }

    .close-btn {
      background: transparent;
      border: 1px solid var(--border);
      width: 26px;
      height: 26px;
      border-radius: 6px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: border-color 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .close-btn::before,
    .close-btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 11px;
      height: 1.5px;
      background: var(--close-icon);
      border-radius: 2px;
      transform-origin: center;
      transition: background 0.2s;
    }

    .close-btn::before { transform: translate(-50%, -50%) rotate(45deg); }
    .close-btn::after  { transform: translate(-50%, -50%) rotate(-45deg); }

    .close-btn:hover {
      border-color: var(--neon-magenta);
      box-shadow: var(--danger-glow);
    }

    .close-btn:hover::before,
    .close-btn:hover::after {
      background: var(--neon-magenta);
    }

    .settings-container {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .setting-group {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
    }

    .setting-group h3 {
      color: var(--neon-cyan);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .pet-selector, .personality-selector {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pet-option {
      font-size: 44px;
      cursor: pointer;
      padding: 8px;
      border-radius: 10px;
      border: 2px solid transparent;
      transition: all 0.3s;
    }

    .pet-option:hover {
      transform: scale(1.1);
    }

    .pet-option.selected {
      border-color: var(--neon-cyan);
      background: var(--accent-bg-dim);
      box-shadow: var(--glow-sm);
    }

    .personality-option {
      flex: 1;
      min-width: 200px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--personality-bg);
      cursor: pointer;
      transition: all 0.3s;
    }

    .personality-option:hover {
      border-color: var(--border-bright);
      box-shadow: var(--glow-sm);
    }

    .personality-option.selected {
      border-color: var(--neon-cyan);
      background: var(--accent-bg-dim);
      box-shadow: var(--glow-sm);
    }

    .personality-emoji {
      font-size: 28px;
    }

    .personality-info {
      flex: 1;
    }

    .personality-name {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
      font-size: 13px;
    }

    .personality-desc {
      font-size: 11px;
      color: var(--text-muted);
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 8px 0;
      color: var(--text);
      font-size: 13px;
    }

    input[type="checkbox"] {
      width: 44px;
      height: 24px;
      appearance: none;
      background: var(--accent-hover-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
    }

    input[type="checkbox"]:checked {
      background: var(--accent-bg-checked);
      border-color: var(--neon-cyan);
    }

    input[type="checkbox"]::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: var(--text-muted);
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.3s, background 0.3s;
    }

    input[type="checkbox"]:checked::before {
      left: 22px;
      background: var(--neon-cyan);
    }

    .mood-display {
      padding: 14px;
      background: var(--accent-bg-faint);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: var(--neon-cyan);
    }

    .bubble-debug-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .bubble-debug-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .bubble-debug-row label {
      min-width: 54px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .bubble-debug-select,
    .bubble-debug-input {
      width: 100%;
      padding: 7px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: rgba(0, 16, 32, 0.75);
      color: var(--text);
      font-size: 12px;
      outline: none;
    }

    .bubble-debug-range {
      width: 100%;
      accent-color: var(--neon-cyan);
    }

    .bubble-debug-hint {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .btn-small {
      padding: 7px 10px;
      font-size: 12px;
      border-radius: 6px;
    }

    .confirm-dialog {
      display: none;
      background: var(--confirm-bg);
      border: 1px solid var(--neon-magenta);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--danger-glow);
    }

    .confirm-dialog.show {
      display: block;
      animation: fadeIn 0.2s ease;
    }

    .confirm-dialog p {
      color: var(--text);
      font-size: 13px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .confirm-dialog .dialog-btns {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .success-toast {
      display: none;
      color: #00ff88;
      font-size: 12px;
      padding: 8px 12px;
      background: rgba(0, 255, 136, 0.08);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 6px;
      margin-top: 8px;
      text-align: center;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .footer-buttons {
      background: var(--input-area-bg);
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      padding: 9px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: transparent;
      color: var(--neon-cyan);
      border: 1px solid var(--border-bright);
    }

    .btn-primary:hover {
      background: var(--accent-hover-bg);
      box-shadow: var(--glow-sm);
    }

    .btn-danger {
      background: transparent;
      color: var(--neon-magenta);
      border: 1px solid var(--danger-border);
    }

    .btn-danger:hover {
      background: var(--danger-hover-bg);
      box-shadow: var(--danger-glow);
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }
  </style>
</head>
<body>
  <div class="window-header">
    <div class="window-title">⚙️ 设置</div>
    <button class="close-btn" onclick="closeWindow()"></button>
  </div>

  <div class="settings-container">
    <div class="setting-group">
      <h3>选择宠物</h3>
      <div class="pet-selector" id="petSelector">
        <div class="pet-option" data-pet="🐱" onclick="selectPet('🐱')">🐱</div>
        <div class="pet-option" data-pet="🐶" onclick="selectPet('🐶')">🐶</div>
        <div class="pet-option" data-pet="🐰" onclick="selectPet('🐰')">🐰</div>
        <div class="pet-option" data-pet="🦊" onclick="selectPet('🦊')">🦊</div>
        <div class="pet-option" data-pet="🐻" onclick="selectPet('🐻')">🐻</div>
      </div>
    </div>

    <div class="setting-group">
      <h3>选择性格</h3>
      <div class="personality-selector" id="personalitySelector">
        <div class="personality-option" data-personality="healing" onclick="selectPersonality('healing')">
          <div class="personality-emoji">💕</div>
          <div class="personality-info">
            <div class="personality-name">治愈陪伴型</div>
            <div class="personality-desc">温柔体贴，关心你的情绪</div>
          </div>
        </div>
        <div class="personality-option" data-personality="funny" onclick="selectPersonality('funny')">
          <div class="personality-emoji">😂</div>
          <div class="personality-info">
            <div class="personality-name">搞笑逗比型</div>
            <div class="personality-desc">幽默风趣，爱讲段子</div>
          </div>
        </div>
        <div class="personality-option" data-personality="cool" onclick="selectPersonality('cool')">
          <div class="personality-emoji">😤</div>
          <div class="personality-info">
            <div class="personality-name">毒舌傲娇型</div>
            <div class="personality-desc">嘴硬心软，傲娇可爱</div>
          </div>
        </div>
        <div class="personality-option" data-personality="assistant" onclick="selectPersonality('assistant')">
          <div class="personality-emoji">📋</div>
          <div class="personality-info">
            <div class="personality-name">贴心助理型</div>
            <div class="personality-desc">专业高效，实用主义</div>
          </div>
        </div>
      </div>
    </div>

    <div class="setting-group">
      <h3>功能开关</h3>
      <label class="toggle-label">
        <input type="checkbox" id="autoSpeakCheck" onchange="toggleAutoSpeak()" />
        <span>主动说话</span>
      </label>
    </div>

    <div class="setting-group">
      <h3>提示框位置调试（测试用）</h3>
      <div class="bubble-debug-row">
        <label for="bubbleStateSelect">状态</label>
        <select id="bubbleStateSelect" class="bubble-debug-select" onchange="onBubbleStateChange()"></select>
      </div>
      <div class="bubble-debug-grid">
        <div>
          <div class="bubble-debug-row">
            <label for="bubbleOffsetXInput">X 偏移</label>
            <input id="bubbleOffsetXInput" class="bubble-debug-input" type="number" min="-200" max="200" step="1" onchange="onBubbleOffsetInput('x', this.value)">
          </div>
          <input id="bubbleOffsetXRange" class="bubble-debug-range" type="range" min="-200" max="200" step="1" oninput="onBubbleOffsetRange('x', this.value)">
        </div>
        <div>
          <div class="bubble-debug-row">
            <label for="bubbleOffsetYInput">Y 偏移</label>
            <input id="bubbleOffsetYInput" class="bubble-debug-input" type="number" min="-200" max="200" step="1" onchange="onBubbleOffsetInput('y', this.value)">
          </div>
          <input id="bubbleOffsetYRange" class="bubble-debug-range" type="range" min="-200" max="200" step="1" oninput="onBubbleOffsetRange('y', this.value)">
        </div>
      </div>
      <div class="bubble-debug-row">
        <button class="btn btn-primary btn-small" onclick="previewBubbleState()">预览该状态</button>
        <button class="btn btn-primary btn-small" onclick="resetCurrentBubbleOffset()">重置当前状态</button>
      </div>
      <div class="bubble-debug-hint">
        说明：该功能仅用于测试 Lottie 不同状态下提示框位置。<br>
        偏移会实时保存并立即生效；后续你可隐藏此面板。
      </div>
    </div>

    <div class="setting-group">
      <h3>心情状态</h3>
      <div class="mood-display" id="moodDisplay">💚 超级开心</div>
      <div class="success-toast" id="resetSuccessToast">✓ 数据已重置！</div>
    </div>

    <div class="confirm-dialog" id="resetConfirmDialog">
      <p>确定要重置所有数据吗？这将清空历史记录和设置。</p>
      <div class="dialog-btns">
        <button class="btn btn-danger" onclick="confirmReset()">确定</button>
        <button class="btn btn-primary" onclick="cancelReset()">取消</button>
      </div>
    </div>
  </div>

  <div class="footer-buttons">
    <button class="btn btn-danger" onclick="resetData()">重置所有数据</button>
    <button class="btn btn-primary" onclick="saveAndClose()">完成</button>
  </div>

  <script src="../src/storage.js"></script>
  <script src="../src/settings-window-utils.js"></script>
  <script>
    const SettingsUtils = window.SettingsWindowUtils;
    let BUBBLE_DEBUG_STATES = [];
    let bubbleOffsets = { idle: { x: 0, y: 8 } };
    let currentBubbleState = 'idle';

    function getBubbleDebugStates() {
      try {
        if (window.electron && typeof window.electron.listLottieJsonFiles === 'function') {
          const files = window.electron.listLottieJsonFiles('cat') || [];
          const states = files
            .filter(name => typeof name === 'string' && name.toLowerCase().endsWith('.json'))
            .map(name => name.replace(/\.json$/i, '').trim())
            .filter(Boolean);
          const uniqueStates = Array.from(new Set(states));
          if (uniqueStates.length > 0) {
            return uniqueStates;
          }
        }
      } catch (error) {
        console.warn('[Settings] 获取 Lottie 状态失败:', error);
      }
      return ['猫坐在枕头上'];
    }

    function clampOffset(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return 0;
      return Math.max(-200, Math.min(200, Math.round(n)));
    }

    function ensureBubbleOffsetState(stateName) {
      if (!bubbleOffsets[stateName]) {
        bubbleOffsets[stateName] = { x: 0, y: 8 };
      }
      return bubbleOffsets[stateName];
    }

    function applyBubbleOffsetEditors() {
      const offset = ensureBubbleOffsetState(currentBubbleState);
      document.getElementById('bubbleOffsetXInput').value = offset.x;
      document.getElementById('bubbleOffsetXRange').value = offset.x;
      document.getElementById('bubbleOffsetYInput').value = offset.y;
      document.getElementById('bubbleOffsetYRange').value = offset.y;
    }

    function persistBubbleOffsets(shouldPreview = false) {
      SettingsUtils.saveBubbleStateOffsets(window.PetStorage, bubbleOffsets);
      SettingsUtils.setBubblePreviewState(window.PetStorage, currentBubbleState);

      if (window.electron && window.electron.sendSettingsChange) {
        window.electron.sendSettingsChange({
          type: 'bubble-offset-update',
          offsets: bubbleOffsets,
          state: currentBubbleState
        });
        if (shouldPreview) {
          window.electron.sendSettingsChange({
            type: 'bubble-offset-preview',
            state: currentBubbleState
          });
        }
      }
    }

    // 加载当前设置
    function loadSettings() {
      const snapshot = SettingsUtils.getSettingsSnapshot(window.PetStorage);

      // 选中当前宠物
      document.querySelectorAll('.pet-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.pet === snapshot.pet);
      });

      // 选中当前性格
      document.querySelectorAll('.personality-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.personality === snapshot.personality);
      });

      // 设置开关状态
      document.getElementById('autoSpeakCheck').checked = snapshot.autoSpeak;

      // 显示心情
      updateMoodDisplay(snapshot.mood);

      // 动态加载状态列表（按 lottie/cat 目录 JSON 文件）
      BUBBLE_DEBUG_STATES = getBubbleDebugStates();

      // 加载提示框位置调试数据
      bubbleOffsets = snapshot.bubbleStateOffsets || { idle: { x: 0, y: 8 } };
      currentBubbleState = snapshot.bubblePreviewState || 'idle';
      if (!BUBBLE_DEBUG_STATES.includes(currentBubbleState)) {
        currentBubbleState = BUBBLE_DEBUG_STATES.includes('猫坐在枕头上')
          ? '猫坐在枕头上'
          : BUBBLE_DEBUG_STATES[0];
      }

      const select = document.getElementById('bubbleStateSelect');
      select.innerHTML = BUBBLE_DEBUG_STATES.map(s => `<option value="${s}">${s}</option>`).join('');
      select.value = currentBubbleState;
      applyBubbleOffsetEditors();
    }

    function selectPet(pet) {
      document.querySelectorAll('.pet-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.pet === pet);
      });

      SettingsUtils.setPetSelection(window.PetStorage, pet);
      if (window.electron && window.electron.sendSettingsChange) {
        window.electron.sendSettingsChange({ type: 'pet', pet });
      }
    }

    function selectPersonality(personality) {
      document.querySelectorAll('.personality-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.personality === personality);
      });

      SettingsUtils.setPersonalitySelection(window.PetStorage, personality);
      if (window.electron && window.electron.sendSettingsChange) {
        window.electron.sendSettingsChange({ type: 'personality', personality });
      }
    }

    function toggleAutoSpeak() {
      const checked = document.getElementById('autoSpeakCheck').checked;
      SettingsUtils.setAutoSpeakEnabled(window.PetStorage, checked);
      if (window.electron && window.electron.sendSettingsChange) {
        window.electron.sendSettingsChange({ type: 'autoSpeak', autoSpeak: checked });
      }
    }

    function onBubbleStateChange() {
      currentBubbleState = document.getElementById('bubbleStateSelect').value;
      applyBubbleOffsetEditors();
      SettingsUtils.setBubblePreviewState(window.PetStorage, currentBubbleState);
      if (window.electron && window.electron.sendPetState) {
        window.electron.sendPetState({ state: currentBubbleState });
      }
      if (window.electron && window.electron.showBubble) {
        window.electron.showBubble(`切换预览状态: ${currentBubbleState}`, 1500);
      }
    }

    function onBubbleOffsetInput(axis, value) {
      const v = clampOffset(value);
      const offset = ensureBubbleOffsetState(currentBubbleState);
      offset[axis] = v;
      applyBubbleOffsetEditors();
      persistBubbleOffsets(false);
    }

    function onBubbleOffsetRange(axis, value) {
      const v = clampOffset(value);
      const offset = ensureBubbleOffsetState(currentBubbleState);
      offset[axis] = v;
      applyBubbleOffsetEditors();
      persistBubbleOffsets(false);
    }

    function previewBubbleState() {
      persistBubbleOffsets(true);
      if (window.electron && window.electron.sendPetState) {
        window.electron.sendPetState({ state: currentBubbleState });
      }
      if (window.electron && window.electron.showBubble) {
        const previewText = `预览状态: ${currentBubbleState} (x:${ensureBubbleOffsetState(currentBubbleState).x}, y:${ensureBubbleOffsetState(currentBubbleState).y})`;
        setTimeout(() => {
          window.electron.showBubble(previewText, 2400);
        }, 120);
      }
    }

    function resetCurrentBubbleOffset() {
      bubbleOffsets[currentBubbleState] = { x: 0, y: 8 };
      applyBubbleOffsetEditors();
      persistBubbleOffsets(true);
    }

    function updateMoodDisplay(mood) {
      const display = document.getElementById('moodDisplay');
      if (mood >= 80) {
        display.textContent = '💚 超级开心';
      } else if (mood >= 60) {
        display.textContent = '😊 心情不错';
      } else if (mood >= 40) {
        display.textContent = '😐 还行吧';
      } else if (mood >= 20) {
        display.textContent = '😔 有点沮丧';
      } else {
        display.textContent = '😢 很不开心';
      }
    }

    function resetData() {
      document.getElementById('resetConfirmDialog').classList.add('show');
    }

    function confirmReset() {
      document.getElementById('resetConfirmDialog').classList.remove('show');
      window.PetStorage.resetAllData();
      if (window.electron && window.electron.sendSettingsChange) {
        window.electron.sendSettingsChange({ type: 'reset' });
      }
      const toast = document.getElementById('resetSuccessToast');
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 2500);
      loadSettings();
    }

    function cancelReset() {
      document.getElementById('resetConfirmDialog').classList.remove('show');
    }

    function saveAndClose() {
      closeWindow();
    }

    function closeWindow() {
      if (window.electron && window.electron.closeChildWindow) {
        window.electron.closeChildWindow('settings');
      }
    }

    // 页面加载时加载设置
    window.addEventListener('DOMContentLoaded', loadSettings);

    // 监听心情更新
    window.addEventListener('mood-updated', (e) => {
      updateMoodDisplay(e.detail);
    });
    console.log('[settings-window] 主题系统已加载');
  </script>
</body>
</html>
