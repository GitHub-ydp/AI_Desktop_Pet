<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip</title>
  <script src="../src/theme-manager.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* 整个窗口透明，允许鼠标穿透 */
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    #tooltip-container {
      padding: 6px 12px;
      border-radius: 6px;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      font-size: 13px;
      line-height: 1.2;
      white-space: nowrap;
      letter-spacing: 0.4px;
      color: rgb(from var(--neon-cyan, #0ff) r g b / 0.96);
      background: rgb(from var(--bg, #020810) r g b / 0.92);
      border: 1px solid rgb(from var(--neon-cyan, #0ff) r g b / 0.45);
      box-shadow: 0 0 12px rgb(from var(--neon-cyan, #0ff) r g b / 0.28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    
    #tooltip-container.visible {
      opacity: 1;
      transform: scale(1);
    }
  </style>
</head>
<body>
  <div id="tooltip-container"></div>
  <script>
    const container = document.getElementById('tooltip-container');
    
    if (window.electron && window.electron.onTooltipShow) {
      window.electron.onTooltipShow((payload) => {
        if (payload && payload.label) {
          container.textContent = payload.label;
          container.classList.add('visible');
        } else {
          container.classList.remove('visible');
        }
      });
    }
  </script>
</body>
</html>
