<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健康提醒</title>
  <script src="../src/theme-manager.js"></script>
  <script src="../src/icons.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .icon { display: inline-flex; align-items: center; justify-content: center; }
    .icon svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    :root {
      --bg: #020810; --bg-surface: rgba(0,15,30,0.98); --bg-card: rgba(0,30,55,0.6);
      --border: rgba(0,255,240,0.3); --border-bright: rgba(0,255,240,0.7);
      --neon-cyan: #00fff0; --neon-magenta: #ff2d78;
      --text: #cff0ff; --text-muted: rgba(160,220,240,0.75);
      --header-bg: rgba(0,15,30,0.98); --input-field-bg: rgba(0,16,32,0.75);
      --accent-bg-dim: rgba(0,255,240,0.08); --accent-bg-faint: rgba(0,255,240,0.05);
      --glow-sm: 0 0 8px rgba(0,255,240,0.4); --radius: 10px;
    }
    body {
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      background: var(--bg, #020810);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .window-header {
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg, rgba(0,15,30,0.98));
      color: var(--neon-cyan);
      font-size: 14px;
      font-weight: 700;
      -webkit-app-region: drag;
    }
    .close-btn {
      width: 26px;
      height: 26px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted, rgba(160,220,240,0.6));
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .close-btn:hover { border-color: var(--neon-magenta, #ff2d78); color: var(--neon-magenta, #ff2d78); }
    .layout { flex: 1; min-height: 0; display: flex; }
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--header-bg, rgba(0,15,30,0.98));
      padding: 14px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-item {
      width: 100%;
      border: none;
      border-left: 3px solid transparent;
      background: transparent;
      color: var(--text-muted, rgba(160,220,240,0.85));
      text-align: left;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }
    .nav-item:hover {
      color: var(--text);
      background: var(--accent-bg-faint, rgba(0,255,240,0.05));
    }
    .nav-item.active {
      color: var(--text);
      border-left-color: var(--neon-cyan);
      background: var(--accent-bg-dim, rgba(0,255,240,0.08));
    }
    .panel-area { flex: 1; min-width: 0; overflow-y: auto; padding: 14px; }
    .panel { display: none; }
    .panel.active { display: block; }
    .card {
      border: 1px solid var(--border);
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title { color: var(--neon-cyan); font-size: 14px; font-weight: 700; margin-bottom: 10px; }
    .row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
    .row label { font-size: 12px; color: var(--text-muted); }
    input[type="text"], input[type="number"], select {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--input-field-bg);
      color: var(--text);
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: var(--border-bright); }
    input[type="text"]::placeholder, input[type="number"]::placeholder { color: var(--text-muted); }
    select option { background: var(--bg-surface); color: var(--text); }
    input[type="text"] { flex: 1; min-width: 160px; }
    .switch {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }
    .switch input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 40px;
      height: 22px;
      background: var(--input-field-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      outline: none;
      position: relative;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
    }
    .switch input[type="checkbox"]::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .switch input[type="checkbox"]:checked {
      background: var(--accent-hover-bg, rgba(0, 255, 240, 0.15));
      border-color: var(--neon-cyan);
      box-shadow: inset 0 0 10px var(--accent-bg-faint, rgba(0, 255, 240, 0.2)), 0 0 8px var(--glow-sm, rgba(0, 255, 240, 0.3));
    }
    .switch input[type="checkbox"]:checked::after {
      left: 20px;
      background: var(--neon-cyan);
      box-shadow: 0 0 10px var(--neon-cyan);
    }
    .btn {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--neon-cyan);
      padding: 8px 12px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn:hover { border-color: var(--border-bright, rgba(0,255,240,0.7)); }
    .muted { color: var(--text-muted); font-size: 12px; line-height: 1.6; }
    .list-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      margin-top: 8px;
      background: var(--bg-card);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .actions { display: flex; gap: 8px; }
    .danger { color: var(--neon-magenta, #ff2d78); border-color: rgba(255,45,120,0.4); }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(2,15,30,0.95);
      color: var(--neon-cyan);
      padding: 7px 14px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar, rgba(0,255,240,0.35)); border-radius: 4px; }
  </style>
</head>
<body>
  <div class="window-header">
    <span style="display: flex; align-items: center; gap: 6px;"><i class="icon" data-icon="health"></i> 健康提醒</span>
    <button class="close-btn" onclick="closeWindow()">×</button>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <button class="nav-item active" style="display: flex; align-items: center; gap: 6px;" data-panel="water" onclick="switchPanel('water')"><i class="icon" data-icon="water"></i> 喝水提醒</button>
      <button class="nav-item" style="display: flex; align-items: center; gap: 6px;" data-panel="eye" onclick="switchPanel('eye')"><i class="icon" data-icon="eye"></i> 护眼休息</button>
      <button class="nav-item" style="display: flex; align-items: center; gap: 6px;" data-panel="exercise" onclick="switchPanel('exercise')"><i class="icon" data-icon="exercise"></i> 伸展运动</button>
      <button class="nav-item" style="display: flex; align-items: center; gap: 6px;" data-panel="custom" onclick="switchPanel('custom')"><i class="icon" data-icon="custom"></i> 自定义提醒</button>
    </aside>

    <main class="panel-area">
      <section class="panel active" id="panel-water">
        <div class="card">
          <div class="card-title">喝水提醒（当前功能）</div>
          <div class="row">
            <label class="switch"><input type="checkbox" id="waterEnabled"> 启用提醒</label>
          </div>
          <div class="row">
            <label>间隔（分钟）</label>
            <input type="number" id="waterInterval" min="5" max="180" value="30" style="width:100px;">
            <input type="text" id="waterMessage" placeholder="记得喝水哦~">
            <button class="btn" onclick="saveWaterSettings()">保存喝水设置</button>
          </div>
        </div>
      </section>

      <section class="panel" id="panel-eye">
        <div class="card">
          <div class="card-title">护眼休息</div>
          <div class="row">
            <label class="switch"><input type="checkbox" id="eyeEnabled"> 启用护眼提醒</label>
          </div>
          <div class="row">
            <label>提醒间隔</label>
            <select id="eyeInterval">
              <option value="20">20分钟</option>
              <option value="30">30分钟</option>
              <option value="60">1小时</option>
            </select>
            <button class="btn" onclick="saveEyeSettings()">保存护眼设置</button>
          </div>
          <div class="muted">20-20-20 法则：每看屏幕 20 分钟，抬头看 20 英尺（约 6 米）外至少 20 秒，帮助缓解视疲劳。</div>
        </div>
      </section>

      <section class="panel" id="panel-exercise">
        <div class="card">
          <div class="card-title">伸展运动</div>
          <div class="row">
            <label class="switch"><input type="checkbox" id="exerciseEnabled"> 启用伸展提醒</label>
          </div>
          <div class="row">
            <label>提醒间隔</label>
            <select id="exerciseInterval">
              <option value="20">20分钟</option>
              <option value="30">30分钟</option>
              <option value="60">1小时</option>
            </select>
            <button class="btn" onclick="randomExerciseTip()">换一个动作</button>
            <button class="btn" onclick="saveExerciseSettings()">保存伸展设置</button>
          </div>
          <div class="muted" id="exerciseTip">动作建议：肩颈绕环 30 秒。</div>
        </div>
      </section>

      <section class="panel" id="panel-custom">
        <div class="card">
          <div class="card-title">自定义提醒</div>
          <div class="row">
            <input type="text" id="customContent" placeholder="提醒内容，例如：起身活动一下">
            <label>间隔</label>
            <input type="number" id="customInterval" min="5" max="1440" value="45" style="width:90px;">
            <button class="btn" onclick="createCustomReminder()">新增提醒</button>
          </div>
          <div class="muted">新增后将调用 `window.PetReminder.create()`，并保存到本地配置。</div>
          <div id="customReminderList"></div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_EYE = 'health_eye_settings';
    const STORAGE_EXERCISE = 'health_exercise_settings';
    const STORAGE_CUSTOM = 'health_custom_reminders';

    const EXERCISE_TIPS = [
      '动作建议：肩颈绕环 30 秒。',
      '动作建议：站立前屈拉伸后侧链。',
      '动作建议：双臂上举伸展，深呼吸 5 次。',
      '动作建议：转动手腕和脚踝，各 20 秒。'
    ];

    let toastTimer = null;
    let customReminders = [];

    function closeWindow() {
      if (window.electron && window.electron.closeChildWindow) {
        window.electron.closeChildWindow('health');
      }
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function switchPanel(panel) {
      document.querySelectorAll('.nav-item').forEach((node) => {
        node.classList.toggle('active', node.dataset.panel === panel);
      });
      document.querySelectorAll('.panel').forEach((node) => {
        node.classList.toggle('active', node.id === `panel-${panel}`);
      });
    }

    function loadLocalJSON(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        return JSON.parse(raw);
      } catch (error) {
        return fallback;
      }
    }

    function saveLocalJSON(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }

    async function loadWaterSettings() {
      try {
        if (!window.PetHealth || !window.PetHealth.getConfig) return;
        const config = await window.PetHealth.getConfig('water');
        if (!config) return;
        document.getElementById('waterEnabled').checked = !!config.enabled;
        document.getElementById('waterInterval').value = Number(config.interval_minutes || 30);
        document.getElementById('waterMessage').value = config.custom_message || '';
      } catch (error) {
        console.error('[health-window] load water settings failed:', error);
      }
    }

    async function saveWaterSettings() {
      const enabled = document.getElementById('waterEnabled').checked;
      const interval = Math.max(5, Number(document.getElementById('waterInterval').value || 30));
      const message = document.getElementById('waterMessage').value.trim();
      try {
        if (window.PetHealth && window.PetHealth.updateConfig) {
          await window.PetHealth.updateConfig('health-water', {
            enabled: enabled ? 1 : 0,
            interval_minutes: interval,
            custom_message: message || null
          });
        }
        showToast('喝水设置已保存');
      } catch (error) {
        console.error('[health-window] save water settings failed:', error);
        showToast('喝水设置保存失败');
      }
    }

    function loadEyeSettings() {
      const cfg = loadLocalJSON(STORAGE_EYE, { enabled: false, interval: 20 });
      document.getElementById('eyeEnabled').checked = !!cfg.enabled;
      document.getElementById('eyeInterval').value = String(cfg.interval || 20);
    }

    function saveEyeSettings() {
      const cfg = {
        enabled: document.getElementById('eyeEnabled').checked,
        interval: Number(document.getElementById('eyeInterval').value || 20)
      };
      saveLocalJSON(STORAGE_EYE, cfg);
      showToast('护眼设置已保存');
    }

    function loadExerciseSettings() {
      const cfg = loadLocalJSON(STORAGE_EXERCISE, { enabled: false, interval: 30, tip: EXERCISE_TIPS[0] });
      document.getElementById('exerciseEnabled').checked = !!cfg.enabled;
      document.getElementById('exerciseInterval').value = String(cfg.interval || 30);
      document.getElementById('exerciseTip').textContent = cfg.tip || EXERCISE_TIPS[0];
    }

    function randomExerciseTip() {
      const tip = EXERCISE_TIPS[Math.floor(Math.random() * EXERCISE_TIPS.length)];
      document.getElementById('exerciseTip').textContent = tip;
    }

    function saveExerciseSettings() {
      const cfg = {
        enabled: document.getElementById('exerciseEnabled').checked,
        interval: Number(document.getElementById('exerciseInterval').value || 30),
        tip: document.getElementById('exerciseTip').textContent
      };
      saveLocalJSON(STORAGE_EXERCISE, cfg);
      showToast('伸展设置已保存');
    }

    function renderCustomReminderList() {
      const container = document.getElementById('customReminderList');
      if (!customReminders.length) {
        container.innerHTML = '<div class="muted" style="margin-top:10px;">暂无自定义健康提醒</div>';
        return;
      }

      container.innerHTML = customReminders.map((item) => `
        <div class="list-item">
          <div>
            <div style="font-size:13px;">${escapeHtml(item.content)}</div>
            <div class="muted">每 ${item.intervalMinutes} 分钟 · ${item.enabled ? '启用' : '停用'}</div>
          </div>
          <div class="actions">
            <button class="btn danger" onclick="removeCustomReminder('${item.id}')">删除</button>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function loadCustomReminders() {
      customReminders = loadLocalJSON(STORAGE_CUSTOM, []);
      if (!Array.isArray(customReminders)) customReminders = [];
      renderCustomReminderList();
    }

    async function createCustomReminder() {
      const content = document.getElementById('customContent').value.trim();
      const intervalMinutes = Math.max(5, Number(document.getElementById('customInterval').value || 45));
      if (!content) {
        showToast('请输入提醒内容');
        return;
      }

      let reminderId = null;
      try {
        if (window.PetReminder && window.PetReminder.create) {
          const created = await window.PetReminder.create({
            content,
            remindAt: Date.now() + intervalMinutes * 60 * 1000,
            metadata: { category: 'health_custom', intervalMinutes }
          });
          reminderId = created && created.id ? created.id : null;
        }
      } catch (error) {
        console.error('[health-window] create custom reminder failed:', error);
      }

      customReminders.unshift({
        id: `custom_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
        content,
        intervalMinutes,
        enabled: true,
        reminderId
      });
      saveLocalJSON(STORAGE_CUSTOM, customReminders);
      document.getElementById('customContent').value = '';
      renderCustomReminderList();
      showToast('已添加自定义提醒');
    }

    async function removeCustomReminder(id) {
      const target = customReminders.find((item) => item.id === id);
      if (!target) return;

      try {
        if (target.reminderId && window.PetReminder && window.PetReminder.cancel) {
          await window.PetReminder.cancel(target.reminderId);
        }
      } catch (error) {
        console.warn('[health-window] cancel custom reminder failed:', error);
      }

      customReminders = customReminders.filter((item) => item.id !== id);
      saveLocalJSON(STORAGE_CUSTOM, customReminders);
      renderCustomReminderList();
      showToast('已删除自定义提醒');
    }

    window.addEventListener('DOMContentLoaded', async () => {
      document.querySelectorAll('.icon[data-icon]').forEach(el => {
        const iconName = el.getAttribute('data-icon');
        if (window.SVGIcons && window.SVGIcons[iconName]) {
          el.innerHTML = window.SVGIcons[iconName];
        }
      });
      await loadWaterSettings();
      loadEyeSettings();
      loadExerciseSettings();
      loadCustomReminders();
    });
  </script>
</body>
</html>
