<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对话历史</title>
  <script src="../src/theme-manager.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #020810; --bg-surface: rgba(0,15,30,0.98); --bg-card: rgba(0,30,55,0.6);
      --border: rgba(0,255,240,0.3); --border-bright: rgba(0,255,240,0.7);
      --neon-cyan: #00fff0; --neon-magenta: #ff2d78;
      --text: #cff0ff; --text-muted: rgba(160,220,240,0.75);
      --header-bg: rgba(0,15,30,0.98); --input-field-bg: rgba(0,16,32,0.75);
      --accent-bg-dim: rgba(0,255,240,0.08); --accent-bg-faint: rgba(0,255,240,0.05);
      --glow-sm: 0 0 8px rgba(0,255,240,0.4); --radius: 10px;
    }
    body {
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      background: var(--bg, #020810);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .window-header {
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg, rgba(0,15,30,0.98));
      color: var(--neon-cyan);
      font-size: 14px;
      font-weight: 700;
      -webkit-app-region: drag;
    }
    .close-btn {
      width: 26px;
      height: 26px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted, rgba(160,220,240,0.6));
      border-radius: 6px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .close-btn:hover { border-color: var(--neon-magenta, #ff2d78); color: var(--neon-magenta, #ff2d78); }
    .layout { flex: 1; display: flex; min-height: 0; }
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--header-bg, rgba(0,15,30,0.98));
      padding: 14px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-item {
      width: 100%;
      border: none;
      border-left: 3px solid transparent;
      background: transparent;
      color: var(--text-muted, rgba(160,220,240,0.85));
      text-align: left;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }
    .nav-item:hover {
      color: var(--text);
      background: var(--accent-bg-faint, rgba(0,255,240,0.05));
    }
    .nav-item.active {
      color: var(--text);
      border-left-color: var(--neon-cyan);
      background: var(--accent-bg-dim, rgba(0,255,240,0.08));
    }
    .panel-area { flex: 1; min-width: 0; padding: 14px; overflow-y: auto; }
    .panel { display: none; }
    .panel.active { display: block; }
    .card {
      border: 1px solid var(--border);
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title { color: var(--neon-cyan); font-size: 13px; font-weight: 700; margin-bottom: 8px; }
    .muted { color: var(--text-muted); font-size: 12px; }
    .history-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      background: var(--bg-card);
    }
    .history-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .history-content { font-size: 13px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; color: var(--text); }
    .empty { font-size: 12px; color: var(--text-muted); padding: 18px 0; text-align: center; }
    .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-row input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--input-field-bg);
      color: var(--text);
      padding: 9px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .search-row input:focus { border-color: var(--border-bright); }
    .search-row input::placeholder { color: var(--text-muted); }
    .btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--neon-cyan);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn:hover { border-color: var(--border-bright, rgba(0,255,240,0.7)); }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-box {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      background: var(--bg-card);
    }
    .stat-value { font-size: 18px; font-weight: 700; color: var(--neon-cyan); }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .bars { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; align-items: end; height: 130px; margin-top: 10px; }
    .bar-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .bar {
      width: 100%;
      min-height: 2px;
      border-radius: 6px 6px 0 0;
      background: linear-gradient(180deg, var(--neon-cyan, rgba(0,255,240,0.95)), var(--accent-bg-dim, rgba(0,255,240,0.3)));
    }
    .bar-day { font-size: 11px; color: var(--text-muted); }
    .bar-num { font-size: 10px; color: var(--text-muted); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar, rgba(0,255,240,0.35)); border-radius: 4px; }
  </style>
</head>
<body>
  <div class="window-header">
    <span>📜 对话历史</span>
    <button class="close-btn" onclick="closeWindow()">×</button>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <button class="nav-item active" data-panel="history" onclick="switchPanel('history')">📜 对话历史</button>
      <button class="nav-item" data-panel="search" onclick="switchPanel('search')">🔍 记忆搜索</button>
      <button class="nav-item" data-panel="stats" onclick="switchPanel('stats')">📊 数据统计</button>
    </aside>

    <main class="panel-area">
      <section class="panel active" id="panel-history">
        <div class="card">
          <div class="card-title">最近对话</div>
          <div class="muted">展示最近 200 条对话记录。</div>
        </div>
        <div id="historyList"></div>
      </section>

      <section class="panel" id="panel-search">
        <div class="card">
          <div class="card-title">关键词检索</div>
          <div class="search-row">
            <input id="searchInput" placeholder="输入关键词，例如：喝水、工作、周末计划">
            <button class="btn" onclick="searchConversations()">搜索</button>
          </div>
          <div class="muted">调用 `window.electron.searchConversations(keyword)`，并展示摘要结果。</div>
        </div>
        <div id="searchResults"></div>
      </section>

      <section class="panel" id="panel-stats">
        <div class="card">
          <div class="card-title">对话统计</div>
          <div class="stat-grid">
            <div class="stat-box">
              <div class="stat-value" id="totalCount">0</div>
              <div class="stat-label">总对话次数</div>
            </div>
            <div class="stat-box">
              <div class="stat-value" id="todayCount">0</div>
              <div class="stat-label">今日对话次数</div>
            </div>
            <div class="stat-box">
              <div class="stat-value" id="topPersonality">-</div>
              <div class="stat-label">最多使用的性格</div>
            </div>
          </div>
          <div class="muted">最近 7 天每日对话柱状图</div>
          <div class="bars" id="weekBars"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const state = {
      activePanel: 'history',
      conversations: [],
      searchResults: []
    };

    function closeWindow() {
      if (window.electron && window.electron.closeChildWindow) {
        window.electron.closeChildWindow('history');
      }
    }

    function formatTime(timestamp) {
      if (!timestamp) return '未知时间';
      return new Date(timestamp).toLocaleString('zh-CN');
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function switchPanel(panel) {
      state.activePanel = panel;
      document.querySelectorAll('.nav-item').forEach((node) => {
        node.classList.toggle('active', node.dataset.panel === panel);
      });
      document.querySelectorAll('.panel').forEach((node) => {
        node.classList.toggle('active', node.id === `panel-${panel}`);
      });
    }

    function renderHistory() {
      const container = document.getElementById('historyList');
      if (!state.conversations.length) {
        container.innerHTML = '<div class="empty">暂无对话记录</div>';
        return;
      }

      container.innerHTML = state.conversations.map((item) => {
        const roleLabel = item.role === 'user' ? '用户' : '宠物';
        const mood = item.metadata && Number.isFinite(Number(item.metadata.mood)) ? Number(item.metadata.mood) : null;
        return `
          <div class="history-item">
            <div class="history-meta">
              <span>${escapeHtml(roleLabel)} · ${escapeHtml(formatTime(item.timestamp))}</span>
              <span>${mood == null ? '' : `心情 ${mood}`}</span>
            </div>
            <div class="history-content">${escapeHtml(item.content || '')}</div>
          </div>
        `;
      }).join('');
    }

    function normalizeSearchResult(raw) {
      if (!raw || typeof raw !== 'object') {
        return { date: '未知时间', summary: String(raw || ''), mood: '--' };
      }
      const ts = raw.timestamp || raw.created_at || raw.createdAt || raw.updated_at || raw.updatedAt;
      const content = raw.content || raw.text || raw.summary || raw.snippet || '';
      const mood = raw.metadata && Number.isFinite(Number(raw.metadata.mood)) ? Number(raw.metadata.mood) : '--';
      return {
        date: formatTime(ts),
        summary: content || '(无内容)',
        mood
      };
    }

    function renderSearchResults() {
      const container = document.getElementById('searchResults');
      if (!state.searchResults.length) {
        container.innerHTML = '<div class="empty">暂无搜索结果</div>';
        return;
      }

      container.innerHTML = state.searchResults.map((item) => `
        <div class="card">
          <div class="history-meta">
            <span>${escapeHtml(item.date)}</span>
            <span>心情：${escapeHtml(item.mood)}</span>
          </div>
          <div class="history-content">${escapeHtml(item.summary)}</div>
        </div>
      `).join('');
    }

    async function searchConversations() {
      const keyword = document.getElementById('searchInput').value.trim();
      if (!keyword) {
        state.searchResults = [];
        renderSearchResults();
        return;
      }

      try {
        let results = [];
        if (window.electron && window.electron.searchConversations) {
          const searched = await window.electron.searchConversations(keyword, { limit: 50 });
          results = Array.isArray(searched) ? searched : [];
        }

        if (!results.length) {
          results = state.conversations.filter((item) => String(item.content || '').includes(keyword));
        }

        state.searchResults = results.map(normalizeSearchResult);
      } catch (error) {
        console.error('[history-window] search failed:', error);
        state.searchResults = [];
      }
      renderSearchResults();
    }

    function getLocalChatHistoryFallback() {
      const keys = ['chat_history', 'chatHistory'];
      for (const key of keys) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) continue;
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) return parsed;
        } catch (error) {
          console.warn('[history-window] parse localStorage history failed:', key, error);
        }
      }
      return [];
    }

    function calcStatsFromConversations(conversations) {
      const now = new Date();
      const todayStr = now.toDateString();
      const personalityMap = new Map();
      const sevenDays = [];

      for (let i = 6; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(now.getDate() - i);
        sevenDays.push({ date: d, key: d.toDateString(), count: 0 });
      }

      let todayCount = 0;
      for (const item of conversations) {
        const ts = item.timestamp || item.created_at || item.createdAt;
        if (!ts) continue;
        const date = new Date(ts);
        if (date.toDateString() === todayStr) {
          todayCount += 1;
        }
        const day = sevenDays.find((v) => v.key === date.toDateString());
        if (day) day.count += 1;

        const personality = item.metadata && item.metadata.personality ? String(item.metadata.personality) : '';
        if (personality) {
          personalityMap.set(personality, (personalityMap.get(personality) || 0) + 1);
        }
      }

      let topPersonality = '-';
      let maxCount = 0;
      personalityMap.forEach((count, key) => {
        if (count > maxCount) {
          maxCount = count;
          topPersonality = key;
        }
      });

      return {
        total: conversations.length,
        today: todayCount,
        topPersonality,
        week: sevenDays
      };
    }

    function renderStats() {
      const fallback = getLocalChatHistoryFallback();
      const source = state.conversations.length ? state.conversations : fallback;
      const stats = calcStatsFromConversations(source);

      document.getElementById('totalCount').textContent = String(stats.total);
      document.getElementById('todayCount').textContent = String(stats.today);
      document.getElementById('topPersonality').textContent = stats.topPersonality;

      const max = Math.max(1, ...stats.week.map((d) => d.count));
      document.getElementById('weekBars').innerHTML = stats.week.map((day) => {
        const h = Math.max(2, Math.round((day.count / max) * 100));
        const label = `${day.date.getMonth() + 1}/${day.date.getDate()}`;
        return `
          <div class="bar-col">
            <div class="bar" style="height:${h}px;"></div>
            <div class="bar-num">${day.count}</div>
            <div class="bar-day">${label}</div>
          </div>
        `;
      }).join('');
    }

    async function loadConversations() {
      try {
        if (window.PetMemory && window.PetMemory.initialize) {
          await window.PetMemory.initialize();
        }
        if (window.PetMemory && window.PetMemory.getConversations) {
          const list = await window.PetMemory.getConversations({ limit: 200 });
          state.conversations = Array.isArray(list) ? list : [];
        } else {
          state.conversations = [];
        }
      } catch (error) {
        console.error('[history-window] load conversations failed:', error);
        state.conversations = [];
      }
      renderHistory();
      renderStats();
      renderSearchResults();
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await loadConversations();
      document.getElementById('searchInput').addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          void searchConversations();
        }
      });
    });
  </script>
</body>
</html>
