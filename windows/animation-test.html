<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>动画测试</title>
  <script src="../src/theme-manager.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #020810;
      --bg-card: rgba(0, 30, 55, 0.6);
      --border: rgba(0, 255, 240, 0.3);
      --border-bright: rgba(0, 255, 240, 0.7);
      --neon-cyan: #00fff0;
      --neon-magenta: #ff2d78;
      --text: #cff0ff;
      --text-muted: rgba(160, 220, 240, 0.55);
      --glow-sm: 0 0 8px rgba(0, 255, 240, 0.4);
      --radius: 8px;
      --header-bg: rgba(0, 15, 30, 0.98);
      --close-icon: rgba(160, 220, 240, 0.6);
      --accent-bg-dim: rgba(0, 255, 240, 0.08);
      --danger-glow: 0 0 8px rgba(255, 45, 120, 0.4);
      --scrollbar: rgba(0, 255, 240, 0.35);
      --scrollbar-hover: rgba(0, 255, 240, 0.6);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* 顶部标题栏 */
    .header {
      background: var(--header-bg);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--neon-cyan);
      text-shadow: var(--glow-sm);
      letter-spacing: 0.5px;
    }

    .close-btn {
      -webkit-app-region: no-drag;
      background: transparent;
      border: 1px solid var(--border);
      width: 26px;
      height: 26px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .close-btn::before,
    .close-btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 11px;
      height: 1.5px;
      background: var(--close-icon);
      border-radius: 2px;
      transform-origin: center;
      transition: background 0.2s;
    }

    .close-btn::before { transform: translate(-50%, -50%) rotate(45deg); }
    .close-btn::after  { transform: translate(-50%, -50%) rotate(-45deg); }

    .close-btn:hover {
      border-color: var(--neon-magenta);
      box-shadow: var(--danger-glow);
    }

    .close-btn:hover::before,
    .close-btn:hover::after {
      background: var(--neon-magenta);
    }

    /* 预览区域 */
    .preview {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin: 16px;
      min-height: 200px;
    }

    #animationPreview {
      width: 200px;
      height: 200px;
    }

    /* 信息显示 */
    .info {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin: 0 16px 16px;
      font-size: 12px;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .info-item:last-child {
      margin-bottom: 0;
    }

    .info-label {
      font-weight: 600;
      color: var(--text-muted);
    }

    .info-value {
      color: var(--neon-cyan);
    }

    /* 按钮网格 */
    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      overflow-y: auto;
      padding: 0 16px 16px;
    }

    .anim-btn {
      padding: 10px 14px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      transition: all 0.2s;
      text-align: left;
    }

    .anim-btn:hover {
      border-color: var(--border-bright);
      box-shadow: var(--glow-sm);
    }

    .anim-btn:active {
      transform: scale(0.98);
    }

    .anim-btn.active {
      border-color: var(--neon-cyan);
      background: var(--accent-bg-dim);
      box-shadow: var(--glow-sm);
    }

    .anim-btn .duration {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .anim-btn.active .duration {
      color: var(--neon-cyan);
    }

    /* 状态指示 */
    .status {
      position: fixed;
      top: 56px;
      right: 16px;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      display: none;
      z-index: 10000;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
    }

    .status.show {
      display: block;
      animation: fadeIn 0.2s ease;
    }

    .status.success {
      color: #00ff88;
      border-color: rgba(0, 255, 136, 0.3);
      background: rgba(0, 255, 136, 0.08);
    }

    .status.error {
      color: var(--neon-magenta);
      border-color: rgba(255, 45, 120, 0.3);
      background: rgba(255, 45, 120, 0.08);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }
  </style>
</head>
<body>
  <div class="container">
    <!-- 顶部标题栏 -->
    <div class="header">
      <h1>动画测试</h1>
      <button class="close-btn" id="closeBtn"></button>
    </div>

    <!-- 预览区域 -->
    <div class="preview">
      <div id="animationPreview"></div>
    </div>

    <!-- 信息显示 -->
    <div class="info">
      <div class="info-item">
        <span class="info-label">当前状态:</span>
        <span class="info-value" id="currentState">-</span>
      </div>
      <div class="info-item">
        <span class="info-label">动画文件:</span>
        <span class="info-value" id="currentFile">-</span>
      </div>
      <div class="info-item">
        <span class="info-label">持续时间:</span>
        <span class="info-value" id="currentDuration">-</span>
      </div>
    </div>

    <!-- 按钮网格 -->
    <div class="buttons" id="buttonGrid">
      <!-- 动态生成 -->
    </div>
  </div>

  <!-- 状态提示 -->
  <div class="status" id="status"></div>

  <script src="../assets/lib/lottie.min.js"></script>
  <script src="../src/animation-config.js"></script>
  <script>
    // 使用 contextBridge API（安全方式）
    var currentAnimation = null;
    var currentBtn = null;

    // 动画状态定义
    var animationStates = [
      { state: 'idle', name: '待机状态', emoji: '😊' },
      { state: 'happy', name: '开心', emoji: '😄' },
      { state: 'sleeping', name: '睡觉', emoji: '😴' },
      { state: 'exercising', name: '运动', emoji: '💪' },
      { state: 'playing', name: '玩耍', emoji: '🎮' },
      { state: 'thinking', name: '思考', emoji: '🤔' },
      { state: 'talking', name: '聊天', emoji: '💬' },
      { state: 'clicked', name: '点击反馈', emoji: '👆' },
      { state: 'sad', name: '悲伤', emoji: '😢' },
      { state: 'dragging', name: '拖拽中', emoji: '🖐️' }
    ];

    // 初始化
    function init() {
      createButtons();
      loadAnimation('idle');
    }

    // 创建按钮
    function createButtons() {
      var grid = document.getElementById('buttonGrid');

      animationStates.forEach(function (item) {
        var btn = document.createElement('button');
        btn.className = 'anim-btn';
        btn.dataset.state = item.state;

        // 获取动画信息
        var info = getAnimationInfo(item.state);
        var durationText = info.duration
          ? (info.duration / 1000) + '秒'
          : '循环';

        btn.innerHTML =
          '<div>' + item.emoji + ' ' + item.name + '</div>' +
          '<div class="duration">' + info.file + ' · ' + durationText + '</div>';

        btn.addEventListener('click', function () {
          loadAnimation(item.state);
          updateActiveButton(btn);
        });

        grid.appendChild(btn);
      });
    }

    // 获取动画信息
    function getAnimationInfo(state) {
      if (!window.AnimationConfig) {
        return { file: 'happy_cat.json', duration: null };
      }

      var file = window.AnimationConfig.getAnimationFile(state, '🐱');
      var duration = window.AnimationConfig.getStateDuration(state, '🐱');

      return { file: file, duration: duration };
    }

    // 更新活动按钮
    function updateActiveButton(activeBtn) {
      document.querySelectorAll('.anim-btn').forEach(function (btn) {
        btn.classList.remove('active');
      });
      activeBtn.classList.add('active');
      currentBtn = activeBtn;
    }

    // 加载动画
    function loadAnimation(state) {
      var info = getAnimationInfo(state);
      var animationPath = 'lottie/cat/' + info.file;

      console.log('[AnimationTest] Loading: ' + state + ' (' + animationPath + ')');

      // 更新信息显示
      document.getElementById('currentState').textContent = state;
      document.getElementById('currentFile').textContent = info.file;
      document.getElementById('currentDuration').textContent = info.duration
        ? (info.duration / 1000) + '秒'
        : '循环';

      // 销毁旧动画
      if (currentAnimation) {
        currentAnimation.destroy();
      }

      // 加载新动画
      var container = document.getElementById('animationPreview');
      container.innerHTML = '';

      try {
        currentAnimation = lottie.loadAnimation({
          container: container,
          renderer: 'svg',
          loop: !info.duration,
          autoplay: true,
          path: animationPath
        });

        showStatus('加载成功', 'success');

        // 如果有持续时间，自动切换回 idle
        if (info.duration) {
          setTimeout(function () {
            if (state !== 'idle') {
              loadAnimation('idle');
              var idleBtn = document.querySelector('[data-state="idle"]');
              if (idleBtn) updateActiveButton(idleBtn);
            }
          }, info.duration);
        }

      } catch (error) {
        console.error('[AnimationTest] Load failed:', error);
        showStatus('加载失败: ' + error.message, 'error');
      }
    }

    // 显示状态提示
    function showStatus(message, type) {
      var status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status show ' + (type || 'info');
      setTimeout(function () {
        status.classList.remove('show');
      }, 3000);
    }

    // 关闭窗口 - 使用 contextBridge API
    function closeWindow() {
      if (window.electron && window.electron.closeChildWindow) {
        window.electron.closeChildWindow('animation-test');
      }
    }

    document.getElementById('closeBtn').addEventListener('click', closeWindow);

    // ESC 关闭
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        closeWindow();
      }
    });

    // 初始化
    init();
    console.log('[animation-test] 主题系统已加载');
  </script>
</body>
</html>
