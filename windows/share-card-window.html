<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>分享卡片</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 750px;
      height: 420px;
      overflow: hidden;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    /* =========================================================
       1. 周报主题 (Cyberpunk HUD 风格)
       ========================================================= */
    body.theme-weekly {
      --bg: #020810;
      --surface: rgba(0, 30, 55, 0.6);
      --surface-strong: rgba(2, 10, 20, 0.8);
      --border: rgba(0, 255, 240, 0.3);
      --border-strong: rgba(0, 255, 240, 0.6);
      --text: #cff0ff;
      --muted: rgba(160, 220, 240, 0.6);
      --accent: #00fff0;
      
      background: var(--bg);
      color: var(--text);
    }
    
    /* 细密网格线背景 */
    body.theme-weekly::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 240, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 240, 0.08) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
      z-index: 0;
    }

    /* 大型半透明宠物 emoji 装饰 */
    body.theme-weekly .bg-emoji {
      position: absolute;
      right: -20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 320px;
      opacity: 0.08;
      z-index: 0;
      pointer-events: none;
      line-height: 1;
      filter: hue-rotate(180deg) brightness(200%);
    }

    body.theme-weekly .panel {
      background: linear-gradient(135deg, rgba(2, 10, 20, 0.95), rgba(0, 20, 40, 0.9));
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 255, 240, 0.05);
      border: 1px solid var(--border);
    }

    /* 顶部宠物头像左边加一条霓虹竖线装饰 */
    body.theme-weekly .header-main {
      position: relative;
      padding-left: 18px;
    }
    body.theme-weekly .header-main::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 80%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      border-radius: 2px;
    }

    /* 统计格霓虹发光边框 */
    body.theme-weekly .summary-panel,
    body.theme-weekly .summary-mini,
    body.theme-weekly .stat-card {
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: inset 0 0 12px rgba(0, 255, 240, 0.05);
    }

    /* 数字加粗带轻微文字光晕 */
    body.theme-weekly .stat-value,
    body.theme-weekly .summary-mini-value,
    body.theme-weekly .summary-highlight em {
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 12px rgba(0, 255, 240, 0.6);
    }

    /* =========================================================
       2. 亲密度里程碑主题 (庆典感)
       ========================================================= */
    body.theme-milestone {
      --bg: #1a0b2e;
      --surface: rgba(30, 15, 50, 0.6);
      --surface-strong: rgba(20, 10, 40, 0.8);
      --border: rgba(255, 105, 180, 0.4);
      --border-strong: rgba(255, 105, 180, 0.8);
      --text: #fff0f5;
      --muted: rgba(255, 240, 245, 0.7);
      --accent: #ffd700;
      
      background: var(--bg);
      color: var(--text);
    }

    /* 深紫→深蓝渐变，带放射状光晕 */
    body.theme-milestone::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(138, 43, 226, 0.6) 0%, rgba(26, 11, 46, 1) 80%);
      z-index: 0;
      pointer-events: none;
    }

    body.theme-milestone .panel {
      background: linear-gradient(135deg, rgba(40, 20, 60, 0.85), rgba(20, 10, 40, 0.95));
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255, 105, 180, 0.15);
      border: 1px solid var(--border);
    }

    /* 超大等级数字，带金色/品红渐变填充 */
    body.theme-milestone .milestone-level {
      font-size: 96px;
      line-height: 1;
      font-weight: 900;
      background: linear-gradient(135deg, #ffd700, #ff1493);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 15px rgba(255, 20, 147, 0.4));
      margin-top: 10px;
      margin-bottom: 5px;
    }

    body.theme-milestone .milestone-stage,
    body.theme-milestone .milestone-side {
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: inset 0 0 15px rgba(255, 105, 180, 0.05);
    }

    /* CSS 绘制 5 颗星星 */
    body.theme-milestone .stars-wrapper {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.6));
    }
    body.theme-milestone .star {
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, #fff, #ffd700);
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }

    /* =========================================================
       3. 基础布局 & 通用组件样式
       ========================================================= */
    .card {
      position: relative;
      width: 750px;
      height: 420px;
      padding: 30px 34px;
      overflow: hidden;
      z-index: 1;
    }

    .panel {
      width: 100%;
      height: 100%;
      border-radius: 28px;
      position: relative;
      padding: 28px 30px 24px;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .card-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 26px;
      z-index: 2;
    }

    .header-main {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .pet-avatar {
      width: 72px;
      height: 72px;
      border-radius: 24px;
      background: var(--surface-strong);
      border: 1px solid var(--border-strong);
      display: grid;
      place-items: center;
      font-size: 42px;
      flex-shrink: 0;
      box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.05);
    }

    .header-copy {
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 34px;
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: 0.01em;
      color: #ffffff;
    }

    .card-subtitle {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
      max-width: 400px;
    }

    .tag {
      flex-shrink: 0;
      padding: 10px 14px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--accent);
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.08em;
    }

    .weekly-layout,
    .milestone-layout {
      position: relative;
      z-index: 2;
      height: 280px;
    }

    /* 周报布局 */
    .weekly-layout {
      display: grid;
      grid-template-columns: 1.12fr 1fr;
      gap: 18px;
    }

    .weekly-summary {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    .summary-panel,
    .summary-mini,
    .stat-card,
    .milestone-stage,
    .milestone-side {
      border-radius: 22px;
    }

    .summary-panel {
      flex: 1;
      padding: 22px 22px 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
    }

    .summary-label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .summary-highlight {
      font-size: 30px;
      line-height: 1.22;
      font-weight: 800;
      color: #ffffff;
    }

    .summary-highlight em {
      font-style: normal;
    }

    .summary-caption {
      font-size: 14px;
      line-height: 1.8;
      color: var(--muted);
    }

    .summary-mini {
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    .summary-mini-label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .summary-mini-value {
      font-size: 26px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .stat-card {
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 132px;
    }

    .stat-label {
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .stat-value {
      font-size: 38px;
      line-height: 1;
      margin-top: 18px;
      word-break: break-word;
    }

    .stat-value.compact {
      font-size: 24px;
      color: #ffffff;
      text-shadow: none;
      line-height: 1.22;
    }

    /* 里程碑布局 */
    .milestone-layout {
      display: grid;
      grid-template-columns: 1.5fr 0.9fr;
      gap: 18px;
    }

    .milestone-stage {
      padding: 24px 24px 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .milestone-topline {
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .milestone-name {
      font-size: 26px;
      font-weight: 800;
      color: #ffffff;
    }

    .milestone-message {
      margin-top: 15px;
      font-size: 15px;
      line-height: 1.9;
      color: var(--muted);
      max-width: 410px;
    }

    .milestone-side {
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .side-title {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .side-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
      margin-top: 10px;
    }

    .side-meta {
      font-size: 13px;
      line-height: 1.8;
      color: var(--muted);
    }

    .watermark {
      position: absolute;
      right: 28px;
      bottom: 22px;
      z-index: 10;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="panel" id="card"></div>
    <div class="watermark">AI Desktop Pet</div>
  </div>

  <script>
    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getPayload() {
      try {
        if (location.hash && location.hash.length > 1) {
          return JSON.parse(decodeURIComponent(location.hash.slice(1)));
        }
      } catch (error) {
        console.warn('[ShareCard] Failed to parse payload:', error);
      }
      return { type: 'weekly', data: {} };
    }

    function getPetMeta() {
      try {
        const raw = localStorage.getItem('pet_data');
        if (!raw) return { emoji: '🐱', name: '猫咪伙伴' };
        const data = JSON.parse(raw);
        return {
          emoji: data.selectedPet || data.emoji || '🐱',
          name: data.name || '猫咪伙伴'
        };
      } catch (error) {
        return { emoji: '🐱', name: '猫咪伙伴' };
      }
    }

    function getDateLabel() {
      const now = new Date();
      const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      return `${now.getMonth() + 1}月${now.getDate()}日 ${weekdays[now.getDay()]}`;
    }

    function animateNumber(element, target, suffix = '', decimals = 0) {
      if (!element) return;
      const numericTarget = Number(target);
      if (!Number.isFinite(numericTarget)) {
        element.textContent = `${target ?? '--'}${suffix}`;
        return;
      }

      const duration = 500;
      const start = performance.now();

      const formatValue = (value) => {
        if (decimals > 0) {
          return `${value.toFixed(decimals)}${suffix}`;
        }
        return `${Math.round(value)}${suffix}`;
      };

      const update = (now) => {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = numericTarget * eased;
        element.textContent = formatValue(current);
        if (progress < 1) {
          requestAnimationFrame(update);
        } else {
          element.textContent = formatValue(numericTarget);
        }
      };

      requestAnimationFrame(update);
    }

    function getWeeklyHighlight(data) {
      if (data.avgMood != null && Number(data.avgMood) >= 80) {
        return '状态很稳，陪伴值持续走高。';
      }
      if (data.avgMood != null && Number(data.avgMood) >= 60) {
        return '节奏不错，这周的互动很有温度。';
      }
      if (data.userMessages) {
        return '这周也有认真陪伴，继续慢慢积累。';
      }
      return '新的故事，准备从这一周开始。';
    }

    function renderWeekly(data, petMeta) {
      const safeBusiestDay = escapeHtml(data.busiestDay || '--');
      const card = document.getElementById('card');
      const subtitle = `${getDateLabel()} · ${escapeHtml(petMeta.name)}的每周陪伴记录`;
      const highlightText = getWeeklyHighlight(data);

      card.innerHTML = `
        <div class="bg-emoji">${escapeHtml(petMeta.emoji)}</div>
        <div class="card-header">
          <div class="header-main">
            <div class="pet-avatar">${escapeHtml(petMeta.emoji)}</div>
            <div class="header-copy">
              <div class="eyebrow">WEEKLY REPORT</div>
              <div class="card-title">本周小结</div>
              <div class="card-subtitle">${subtitle}</div>
            </div>
          </div>
          <div class="tag">AI DESKTOP PET</div>
        </div>
        <div class="weekly-layout">
          <div class="weekly-summary">
            <div class="summary-panel">
              <div class="summary-label">本周关键词</div>
              <div class="summary-highlight">和 <em>${escapeHtml(petMeta.name)}</em> 一起，把日常聊成了故事。</div>
              <div class="summary-caption">${escapeHtml(highlightText)}</div>
            </div>
            <div class="summary-mini">
              <div>
                <div class="summary-mini-label">最活跃的一天</div>
                <div class="card-subtitle" style="margin-top: 6px;">互动最密集的记录点</div>
              </div>
              <div class="summary-mini-value">${safeBusiestDay}</div>
            </div>
          </div>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-label">本周对话</div>
              <div class="stat-value" id="weekly-messages">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">平均心情</div>
              <div class="stat-value" id="weekly-mood">0分</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">最活跃</div>
              <div class="stat-value compact">${safeBusiestDay}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">全部消息</div>
              <div class="stat-value" id="weekly-total">0</div>
            </div>
          </div>
        </div>
      `;

      animateNumber(document.getElementById('weekly-messages'), data.userMessages || 0);
      animateNumber(document.getElementById('weekly-total'), data.totalMessages || 0);
      animateNumber(document.getElementById('weekly-mood'), data.avgMood || 0, '分');
    }

    function renderMilestone(data, petMeta) {
      const level = Number(data.level) || 1;
      const levelName = escapeHtml(data.levelName || '新朋友');
      const message = escapeHtml(data.message || '我们的故事才刚开始。');
      const progressText = escapeHtml(data.progressText || '--');
      const totalDays = Number(data.totalDays) || 0;
      const points = Number(data.points) || 0;
      const card = document.getElementById('card');

      card.innerHTML = `
        <div class="card-header">
          <div class="header-main">
            <div class="pet-avatar">${escapeHtml(petMeta.emoji)}</div>
            <div class="header-copy">
              <div class="eyebrow">INTIMACY MILESTONE</div>
              <div class="card-title">亲密度里程碑</div>
              <div class="card-subtitle">${escapeHtml(petMeta.name)}正在把陪伴升级成更深的羁绊。</div>
            </div>
          </div>
          <div class="tag">AI DESKTOP PET</div>
        </div>
        <div class="milestone-layout">
          <div class="milestone-stage">
            <div>
              <div class="milestone-topline">LEVEL ACHIEVED</div>
              <div class="milestone-level">Lv.${level}</div>
              <div class="milestone-name">${levelName}</div>
              <div class="stars-wrapper">
                <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
              </div>
              <div class="milestone-message">“${message}”</div>
            </div>
            <div class="card-subtitle">每一次互动、每一段对话，都会慢慢累积成更长久的陪伴。</div>
          </div>
          <div class="milestone-side">
            <div>
              <div class="side-title">当前进度</div>
              <div class="side-chip">${progressText}</div>
            </div>
            <div>
              <div class="side-title">累计亲密度</div>
              <div class="side-chip" id="milestone-points">0</div>
            </div>
            <div class="side-meta">${totalDays > 0 ? \`已经一起走过 \${totalDays} 天\` : '新的陪伴刚刚开始'}</div>
          </div>
        </div>
      `;

      animateNumber(document.getElementById('milestone-points'), points);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const payload = getPayload();
      const petMeta = getPetMeta();
      
      // 根据类型添加顶级样式类以区分主题
      document.body.className = \`theme-\${payload.type === 'milestone' ? 'milestone' : 'weekly'}\`;
      
      if (payload.type === 'milestone') {
        renderMilestone(payload.data || {}, petMeta);
        return;
      }
      renderWeekly(payload.data || {}, petMeta);
    });
  </script>
</body>
</html>
