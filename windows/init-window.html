<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>完善称呼</title>
  <script src="../src/theme-manager.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #020810;
      --panel: rgba(16, 24, 34, 0.96);
      --panel-soft: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 179, 71, 0.24);
      --border-strong: rgba(255, 179, 71, 0.42);
      --text: #fff1de;
      --muted: rgba(255, 231, 204, 0.68);
      --accent: #ffb347;
      --accent-strong: #ffd08e;
      --danger: #ff7b7b;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.28);
    }

    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .window-header {
      height: 48px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 14, 20, 0.98);
      -webkit-app-region: drag;
    }

    .window-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent-strong);
    }

    .close-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      -webkit-app-region: no-drag;
    }

    .shell {
      flex: 1;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
    }

    .hero {
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 179, 71, 0.12), rgba(255, 179, 71, 0.03));
      box-shadow: var(--shadow);
    }

    .hero h1 {
      font-size: 22px;
      line-height: 1.15;
      color: var(--accent-strong);
    }

    .hero p {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--muted);
    }

    .card {
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--panel-soft);
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-strong);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
    }

    .text-input,
    .text-area {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 11px 12px;
      outline: none;
      font: inherit;
    }

    .text-input:focus,
    .text-area:focus {
      border-color: var(--border-strong);
    }

    .text-area {
      min-height: 88px;
      resize: vertical;
    }

    .optional-grid {
      display: grid;
      gap: 12px;
    }

    .error {
      margin-top: 8px;
      font-size: 12px;
      color: var(--danger);
    }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      background: rgba(10, 14, 20, 0.98);
    }

    .btn {
      min-width: 96px;
      height: 38px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ffd08e, #ffb347);
      border-color: transparent;
      color: #261608;
    }
  </style>
</head>
<body>
  <div class="window-header">
    <div class="window-title">完善称呼</div>
    <button class="close-btn" type="button" aria-label="关闭" onclick="skipInit()">×</button>
  </div>

  <div class="shell">
    <section class="hero">
      <h1>先告诉我怎么称呼你吧</h1>
      <p>这样我会叫得更自然。其他信息都可以稍后再补充，不会影响你继续使用。</p>
    </section>

    <section class="card" id="nameGroup">
      <label class="label" for="initName">昵称</label>
      <input id="initName" class="text-input" type="text" placeholder="比如：小张、阿林、Mia" autofocus>
      <div class="hint">这是唯一建议现在填写的内容。</div>
    </section>

    <section class="card optional-grid">
      <div>
        <label class="label" for="initBirthday">生日（可选）</label>
        <input id="initBirthday" class="text-input" type="date">
      </div>
      <div>
        <label class="label" for="initInterests">兴趣或偏好（可选）</label>
        <textarea id="initInterests" class="text-area" placeholder="比如：看书、游戏、咖啡、写作、跑步"></textarea>
      </div>
    </section>
  </div>

  <div class="footer">
    <button class="btn" type="button" onclick="skipInit()">稍后再说</button>
    <button class="btn btn-primary" type="button" onclick="submitInit()">保存</button>
  </div>

  <script>
    function skipInit() {
      window.dispatchEvent(new CustomEvent('init-skipped'));
      if (window.electron && window.electron.closeChildWindow) {
        window.electron.closeChildWindow('init');
      }
    }

    function submitInit() {
      const name = document.getElementById('initName').value.trim();
      const birthday = document.getElementById('initBirthday').value;
      const interests = document.getElementById('initInterests').value.trim();

      if (!name) {
        const nameGroup = document.getElementById('nameGroup');
        let error = nameGroup.querySelector('.error');
        if (!error) {
          error = document.createElement('div');
          error.className = 'error';
          nameGroup.appendChild(error);
        }
        error.textContent = '先告诉我怎么称呼你吧。';
        document.getElementById('initName').focus();
        return;
      }

      window.dispatchEvent(new CustomEvent('init-completed', {
        detail: {
          name,
          gender: '',
          birthday,
          interests
        }
      }));

      if (window.electron && window.electron.closeChildWindow) {
        window.electron.closeChildWindow('init');
      }
    }

    document.getElementById('initName').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        submitInit();
      }
    });
  </script>
</body>
</html>
