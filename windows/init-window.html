<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初始化设置</title>
  <script src="../src/theme-manager.js"></script>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #020810;
  --bg-card: rgba(0, 30, 55, 0.6);
  --border: rgba(0, 255, 240, 0.3);
  --border-bright: rgba(0, 255, 240, 0.7);
  --neon-cyan: #00fff0;
  --neon-magenta: #ff2d78;
  --text: #cff0ff;
  --text-muted: rgba(160, 220, 240, 0.55);
  --glow-sm: 0 0 8px rgba(0, 255, 240, 0.4);
  --radius: 8px;
  --header-bg: rgba(0, 15, 30, 0.98);
  --input-area-bg: rgba(0, 12, 25, 0.98);
  --input-field-bg: rgba(0, 15, 35, 0.8);
  --close-icon: rgba(160, 220, 240, 0.6);
  --danger-glow: 0 0 8px rgba(255, 45, 120, 0.4);
  --accent-hover-bg: rgba(0, 255, 240, 0.1);
  --scrollbar: rgba(0, 255, 240, 0.35);
  --scrollbar-hover: rgba(0, 255, 240, 0.6);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.window-header {
  background: var(--header-bg);
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  -webkit-app-region: drag;
  flex-shrink: 0;
}

.window-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--neon-cyan);
  text-shadow: var(--glow-sm);
}

.close-btn {
  background: transparent;
  border: 1px solid var(--border);
  width: 26px;
  height: 26px;
  border-radius: 6px;
  cursor: pointer;
  -webkit-app-region: no-drag;
  transition: border-color 0.2s, box-shadow 0.2s;
  position: relative;
}

.close-btn::before,
.close-btn::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 11px;
  height: 1.5px;
  background: var(--close-icon);
  border-radius: 2px;
  transform-origin: center;
  transition: background 0.2s;
}

.close-btn::before { transform: translate(-50%, -50%) rotate(45deg); }
.close-btn::after  { transform: translate(-50%, -50%) rotate(-45deg); }

.close-btn:hover {
  border-color: var(--neon-magenta);
  box-shadow: var(--danger-glow);
}

.close-btn:hover::before,
.close-btn:hover::after {
  background: var(--neon-magenta);
}

.init-container {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.welcome-text {
  color: var(--text-muted);
  text-align: center;
  font-size: 13px;
  margin-bottom: 4px;
}

.form-group {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.form-label {
  display: block;
  font-weight: 600;
  font-size: 12px;
  color: var(--neon-cyan);
  margin-bottom: 8px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.form-input {
  width: 100%;
  padding: 10px 13px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  outline: none;
  background: var(--input-field-bg);
  color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-input::placeholder {
  color: var(--text-muted);
}

.form-input:focus {
  border-color: var(--border-bright);
  box-shadow: var(--glow-sm);
}

.form-textarea {
  width: 100%;
  padding: 10px 13px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  outline: none;
  resize: vertical;
  font-family: inherit;
  background: var(--input-field-bg);
  color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s;
  min-height: 72px;
}

.form-textarea::placeholder {
  color: var(--text-muted);
}

.form-textarea:focus {
  border-color: var(--border-bright);
  box-shadow: var(--glow-sm);
}

.form-radio-group {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.form-radio {
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  color: var(--text);
  font-size: 13px;
}

.form-radio input[type="radio"] {
  width: 15px;
  height: 15px;
  accent-color: var(--neon-cyan);
  cursor: pointer;
}

.error-msg {
  color: var(--neon-magenta);
  font-size: 12px;
  margin-top: 6px;
  text-shadow: var(--danger-glow);
}

.footer-buttons {
  background: var(--input-area-bg);
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  flex-shrink: 0;
}

.btn {
  padding: 9px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, box-shadow 0.2s;
}

.btn-primary {
  background: transparent;
  color: var(--neon-cyan);
  border: 1px solid var(--border-bright);
}

.btn-primary:hover {
  background: var(--accent-hover-bg);
  box-shadow: var(--glow-sm);
}

.btn-secondary {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  background: var(--accent-hover-bg);
  border-color: var(--border-bright);
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }
  </style>
</head>
<body>
  <div class="window-header">
    <div class="window-title">👋 嗨，很高兴认识你！</div>
    <button class="close-btn" onclick="skipInit()"></button>
  </div>

  <div class="init-container">
    <p class="welcome-text">让我更了解你，这样我们可以更好地相处~</p>

    <div class="form-group" id="nameGroup">
      <label class="form-label">你的名字</label>
      <input type="text" id="initName" class="form-input" placeholder="怎么称呼你？" autofocus>
    </div>

    <div class="form-group">
      <label class="form-label">你的性别</label>
      <div class="form-radio-group">
        <label class="form-radio">
          <input type="radio" name="initGender" value="男">
          <span>男生</span>
        </label>
        <label class="form-radio">
          <input type="radio" name="initGender" value="女">
          <span>女生</span>
        </label>
        <label class="form-radio">
          <input type="radio" name="initGender" value="其他" checked>
          <span>保密</span>
        </label>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">你的生日（可选）</label>
      <input type="date" id="initBirthday" class="form-input">
    </div>

    <div class="form-group">
      <label class="form-label">兴趣爱好（可选）</label>
      <textarea id="initInterests" class="form-textarea" placeholder="比如：玩游戏、看书、听音乐..." rows="3"></textarea>
    </div>
  </div>

  <div class="footer-buttons">
    <button class="btn btn-secondary" onclick="skipInit()">跳过</button>
    <button class="btn btn-primary" onclick="submitInit()">完成设置</button>
  </div>

  <script>
    function skipInit() {
      window.dispatchEvent(new CustomEvent('init-skipped'));
      if (window.electron && window.electron.closeChildWindow) {
        window.electron.closeChildWindow('init');
      }
    }

    async function submitInit() {
      const name = document.getElementById('initName').value.trim();
      const gender = document.querySelector('input[name="initGender"]:checked')?.value;
      const birthday = document.getElementById('initBirthday').value;
      const interests = document.getElementById('initInterests').value.trim();

      if (!name) {
        const nameGroup = document.getElementById('nameGroup');
        let errMsg = nameGroup.querySelector('.error-msg');
        if (!errMsg) {
          errMsg = document.createElement('div');
          errMsg.className = 'error-msg';
          nameGroup.appendChild(errMsg);
        }
        errMsg.textContent = '至少告诉我你的名字嘛~';
        document.getElementById('initName').focus();
        return;
      }

      // 构建用户信息
      const userInfo = {
        name,
        gender,
        birthday,
        interests
      };

      // 发送事件到主窗口
      window.dispatchEvent(new CustomEvent('init-completed', { detail: userInfo }));

      // 关闭窗口
      if (window.electron && window.electron.closeChildWindow) {
        window.electron.closeChildWindow('init');
      }
    }

    // Enter 键提交
    document.getElementById('initName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        submitInit();
      }
    });
    console.log('[init-window] 赛博朋克风格已加载');
  </script>
</body>
</html>
